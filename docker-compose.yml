services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: udjcs
      POSTGRES_USER: udjcs
      POSTGRES_PASSWORD: udjcs
    ports:
      - "5432:5432"
    volumes:
      - udjcs_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  udjcs_data:
