spring.application.name=udjcs

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/udjcs}
spring.datasource.username=${DATABASE_USERNAME:udjcs}
spring.datasource.password=${DATABASE_PASSWORD:udjcs}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

server.port=8082

app.admin.username=admin
app.admin.password=admin@udjcs

# Mail (Gmail SMTP — set MAIL_USERNAME and MAIL_PASSWORD env vars or edit here)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:basalvivek@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ilwjqggmpsmkmelw}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

app.upload.dir=uploads

spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
