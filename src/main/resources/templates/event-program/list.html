<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Event Planning</title></head>
<body>

<th:block layout:fragment="page-title">Event Planning</th:block>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Event Planning</h5>
        <a th:href="@{/event-programs/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Add Programs
        </a>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Event</th>
                        <th>Date</th>
                        <th>Programs</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry, stat : ${grouped}">
                        <td class="text-muted" th:text="${stat.count}"></td>
                        <td>
                            <span class="fw-medium" th:text="${entry.key.eventName}"></span>
                            <div class="text-muted" style="font-size:0.75rem;" th:text="${entry.key.eventType}"></div>
                        </td>
                        <td>
                            <span th:text="${#temporals.format(entry.key.eventDate, 'dd-MMM-yyyy')}"></span>
                            <div th:if="${entry.key.endDate != null}" class="text-muted" style="font-size:0.75rem;"
                                 th:text="'to ' + ${#temporals.format(entry.key.endDate, 'dd-MMM-yyyy')}"></div>
                        </td>
                        <td>
                            <span class="badge rounded-pill"
                                  style="background:#eef2ff;color:#4f46e5;font-size:0.75rem;"
                                  th:text="${#lists.size(entry.value)} + ' program' + (${#lists.size(entry.value)} != 1 ? 's' : '')"></span>
                        </td>
                        <td>
                            <span th:with="s=${entry.key.status}"
                                  th:class="${s == 'Active'} ? 'badge bg-success' : (${s == 'Planned'} ? 'badge bg-primary' : (${s == 'Completed'} ? 'badge bg-secondary' : 'badge bg-danger'))"
                                  th:text="${s}"></span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/event-programs/event/{id}(id=${entry.key.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-calendar2-week me-1"></i>View Programs
                            </a>
                            <a th:href="@{/event-programs/{id}/edit-all(id=${entry.key.id})}"
                               class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil-fill me-1"></i>Edit
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${grouped.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">No event programs found. Click <strong>Add Programs</strong> to get started.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
