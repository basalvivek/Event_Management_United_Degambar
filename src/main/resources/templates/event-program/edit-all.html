<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Edit Event Programs</title></head>
<body>

<th:block layout:fragment="page-title" th:text="'Edit Programs — ' + ${event.eventName}">Edit Programs</th:block>

<div layout:fragment="content">

    <!-- Event info header -->
    <div class="card border-0 shadow-sm mb-4" style="border-radius:12px;overflow:hidden;">
        <div style="height:3px;background:linear-gradient(90deg,#4f46e5,#7c3aed);"></div>
        <div class="card-body px-4 py-3 d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center justify-content-center rounded-circle flex-shrink-0"
                     style="width:40px;height:40px;background:linear-gradient(135deg,#4f46e5,#7c3aed);">
                    <i class="bi bi-calendar-event-fill text-white" style="font-size:1rem;"></i>
                </div>
                <div>
                    <div class="fw-bold" style="font-size:0.95rem;color:#1e293b;" th:text="${event.eventName}"></div>
                    <div class="text-muted" style="font-size:0.78rem;">
                        <i class="bi bi-calendar3 me-1"></i>
                        <span th:text="${#temporals.format(event.eventDate,'dd-MMM-yyyy')}"></span>
                        <span class="ms-2"><i class="bi bi-geo-alt me-1"></i><span th:text="${event.venue}"></span></span>
                    </div>
                </div>
            </div>
            <span th:with="s=${event.status}"
                  th:class="${s == 'Active'} ? 'badge bg-success px-3 py-2' : (${s == 'Planned'} ? 'badge bg-primary px-3 py-2' : (${s == 'Completed'} ? 'badge bg-secondary px-3 py-2' : 'badge bg-danger px-3 py-2'))"
                  style="font-size:0.78rem;" th:text="${event.status}"></span>
        </div>
    </div>

    <div class="card shadow-sm border-0" style="max-width:980px;">
        <div class="card-header bg-white border-bottom d-flex align-items-center justify-content-between">
            <span class="fw-semibold">Edit Program Schedule</span>
            <span class="text-muted" style="font-size:0.78rem;">Modify, add or remove programs. Changes replace the existing schedule.</span>
        </div>
        <div class="card-body">

            <!-- Error banner -->
            <div th:if="${formError}" class="alert alert-danger d-flex align-items-center gap-2 mb-3" style="font-size:0.86rem;">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${formError}"></span>
            </div>

            <form th:action="@{/event-programs/{id}/edit-all(id=${event.id})}" method="post">

                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div>
                        <span class="fw-semibold" style="font-size:0.9rem;color:#1e1b4b;">
                            <i class="bi bi-layout-text-sidebar-reverse text-primary me-2"></i>Programs
                        </span>
                        <div class="text-muted" style="font-size:0.75rem;">Edit existing programs or add new ones below.</div>
                    </div>
                    <button type="button" class="btn btn-primary btn-sm px-3" onclick="addProgramRow()">
                        <i class="bi bi-plus-lg me-1"></i>Add Program
                    </button>
                </div>

                <div id="programRows" class="d-flex flex-column gap-3">

                    <!-- ── Pre-filled existing program rows ── -->
                    <div th:each="prog, pstat : ${programs}"
                         class="program-row-card p-3 rounded-3"
                         style="background:#f8faff;border:1px solid #e0e7ff;">

                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <span class="badge rounded-pill px-3 py-2"
                                  style="background:#4f46e5;color:#fff;font-size:0.78rem;">
                                <i class="bi bi-layout-text-sidebar-reverse me-1"></i>Program
                                <span th:text="${pstat.count}"></span>
                            </span>
                            <button type="button" class="btn btn-sm btn-outline-danger px-2"
                                    onclick="removeRow(this)" title="Remove">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">
                                    Program Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="programNames" class="form-control form-control-sm"
                                       th:value="${prog.programName}" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">Responsible Person</label>
                                <select name="responsibleMemberIds" class="form-select form-select-sm">
                                    <option value="">— None —</option>
                                    <option th:each="m : ${members}"
                                            th:value="${m.id}"
                                            th:selected="${prog.responsibleMember != null and prog.responsibleMember.id == m.id}"
                                            th:text="${m.firstName + ' ' + m.lastName + '  ·  ' + m.phone}"></option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">Description</label>
                                <textarea name="programDescriptions" class="form-control form-control-sm" rows="2"
                                          th:text="${prog.programDescription}"></textarea>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">
                                    Start Time <span class="text-danger">*</span>
                                </label>
                                <input type="time" name="startTimes" class="form-control form-control-sm"
                                       th:value="${#temporals.format(prog.startTime,'HH:mm')}" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">
                                    End Time <span class="text-danger">*</span>
                                </label>
                                <input type="time" name="endTimes" class="form-control form-control-sm"
                                       th:value="${#temporals.format(prog.endTime,'HH:mm')}" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">Remark</label>
                                <input type="text" name="remarks" class="form-control form-control-sm"
                                       th:value="${prog.remark}">
                            </div>

                        </div>
                    </div>

                </div>

                <!-- Hidden member source for JS-added rows -->
                <select id="memberSrc" style="display:none;">
                    <option value="">— None —</option>
                    <option th:each="m : ${members}"
                            th:value="${m.id}"
                            th:text="${m.firstName + ' ' + m.lastName + '  ·  ' + m.phone}"></option>
                </select>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save All Programs
                    </button>
                    <a th:href="@{/event-programs/event/{id}(id=${event.id})}"
                       class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</div>

<th:block layout:fragment="page-scripts">
<script>
(function () {
    function getMemberOptions() {
        return document.getElementById('memberSrc').innerHTML;
    }

    function renumber() {
        var badges = document.querySelectorAll('#programRows .badge');
        badges.forEach(function (b, i) {
            b.innerHTML = '<i class="bi bi-layout-text-sidebar-reverse me-1"></i>Program ' + (i + 1);
        });
    }

    window.addProgramRow = function () {
        var container = document.getElementById('programRows');
        var div = document.createElement('div');
        div.className = 'program-row-card p-3 rounded-3';
        div.style.cssText = 'background:#f8faff;border:1px solid #e0e7ff;';

        div.innerHTML =
            '<div class="d-flex align-items-center justify-content-between mb-3">' +
                '<span class="badge rounded-pill px-3 py-2" style="background:#4f46e5;color:#fff;font-size:0.78rem;">' +
                    '<i class="bi bi-layout-text-sidebar-reverse me-1"></i>Program' +
                '</span>' +
                '<button type="button" class="btn btn-sm btn-outline-danger px-2" onclick="removeRow(this)" title="Remove">' +
                    '<i class="bi bi-x-lg"></i>' +
                '</button>' +
            '</div>' +
            '<div class="row g-3">' +
                '<div class="col-md-6">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Program Name <span class="text-danger">*</span></label>' +
                    '<input type="text" name="programNames" class="form-control form-control-sm" placeholder="e.g. Welcome Address" required>' +
                '</div>' +
                '<div class="col-md-6">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Responsible Person</label>' +
                    '<select name="responsibleMemberIds" class="form-select form-select-sm">' + getMemberOptions() + '</select>' +
                '</div>' +
                '<div class="col-12">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Description</label>' +
                    '<textarea name="programDescriptions" class="form-control form-control-sm" rows="2"></textarea>' +
                '</div>' +
                '<div class="col-md-4">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Start Time <span class="text-danger">*</span></label>' +
                    '<input type="time" name="startTimes" class="form-control form-control-sm" required>' +
                '</div>' +
                '<div class="col-md-4">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">End Time <span class="text-danger">*</span></label>' +
                    '<input type="time" name="endTimes" class="form-control form-control-sm" required>' +
                '</div>' +
                '<div class="col-md-4">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Remark</label>' +
                    '<input type="text" name="remarks" class="form-control form-control-sm">' +
                '</div>' +
            '</div>';

        container.appendChild(div);
        renumber();
    };

    window.removeRow = function (btn) {
        btn.closest('.program-row-card').remove();
        renumber();
    };

    renumber();
})();
</script>
</th:block>

</body>
</html>
