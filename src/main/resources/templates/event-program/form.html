<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Event Planning</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item == null ? 'Add Event Programs' : 'Edit Event Program'}">Event Program</th:block>

<div layout:fragment="content">

    <!-- ══════════════════════════════════════
         CREATE MODE — multi-row entry
    ══════════════════════════════════════ -->
    <div th:if="${item == null}">
        <div class="card shadow-sm border-0" style="max-width:960px;">
            <div class="card-header bg-white border-bottom">
                <span class="fw-semibold">Add Event Programs</span>
                <span class="text-muted ms-2" style="font-size:0.78rem;">Select an event, then add one or more programs below.</span>
            </div>
            <div class="card-body">

                <!-- Error banner -->
                <div th:if="${formError}" class="alert alert-danger d-flex align-items-center gap-2 mb-3" style="font-size:0.86rem;">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${formError}"></span>
                </div>

                <form th:action="@{/event-programs}" method="post">

                    <!-- Event selector -->
                    <div class="mb-4">
                        <label class="form-label fw-medium">Event <span class="text-danger">*</span></label>
                        <select name="eventId" id="eventId" class="form-select" style="max-width:480px;"
                                required>
                            <option value="">-- Select a Planned Event --</option>
                            <option th:each="e : ${events}"
                                    th:value="${e.id}"
                                    th:text="${e.eventName} + '  ·  ' + ${#temporals.format(e.eventDate,'dd-MMM-yyyy')}"></option>
                        </select>
                        <div th:if="${#lists.isEmpty(events)}" class="form-text text-warning mt-1">
                            <i class="bi bi-exclamation-circle me-1"></i>No events with <strong>Planned</strong> status. Please update an event's status first.
                        </div>
                    </div>

                    <!-- Program rows -->
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <div>
                            <span class="fw-semibold" style="font-size:0.9rem;color:#1e1b4b;">
                                <i class="bi bi-layout-text-sidebar-reverse text-primary me-2"></i>Programs
                            </span>
                            <span class="text-danger ms-1">*</span>
                            <div class="text-muted" style="font-size:0.75rem;">Add one or more program segments for this event.</div>
                        </div>
                        <button type="button" class="btn btn-primary btn-sm px-3" onclick="addProgramRow()">
                            <i class="bi bi-plus-lg me-1"></i>Add Program
                        </button>
                    </div>

                    <div id="programRows" class="d-flex flex-column gap-3"></div>

                    <!-- Hidden member source for JS cloning -->
                    <select id="memberSrc" style="display:none;">
                        <option value="">— None —</option>
                        <option th:each="m : ${members}"
                                th:value="${m.id}"
                                th:text="${m.firstName} + ' ' + ${m.lastName} + '  ·  ' + ${m.phone}"></option>
                    </select>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-1"></i>Save All Programs
                        </button>
                        <a th:href="@{/event-programs}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         EDIT MODE — single record
    ══════════════════════════════════════ -->
    <div th:unless="${item == null}">
        <div class="card shadow-sm border-0" style="max-width:760px;">
            <div class="card-header bg-white border-bottom fw-semibold">Edit Event Program</div>
            <div class="card-body">
                <form th:action="@{/event-programs/{id}(id=${item.id})}"
                      th:object="${item}" method="post">
                    <input type="hidden" name="returnEventId" th:if="${returnEventId != null}" th:value="${returnEventId}">

                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label fw-medium">Event <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{eventId}"
                                    th:classappend="${#fields.hasErrors('eventId')} ? ' is-invalid'">
                                <option value="">-- Select Event --</option>
                                <option th:each="e : ${events}"
                                        th:value="${e.id}"
                                        th:text="${e.eventName} + '  ·  ' + ${#temporals.format(e.eventDate,'dd-MMM-yyyy')} + '  [' + ${e.status} + ']'"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{eventId}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-medium">Program Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{programName}"
                                   th:classappend="${#fields.hasErrors('programName')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{programName}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-medium">Description</label>
                            <textarea class="form-control" th:field="*{programDescription}" rows="3"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-medium">Start Time <span class="text-danger">*</span></label>
                            <input type="time" class="form-control" th:field="*{startTime}"
                                   th:classappend="${#fields.hasErrors('startTime')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{startTime}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-medium">End Time <span class="text-danger">*</span></label>
                            <input type="time" class="form-control" th:field="*{endTime}"
                                   th:classappend="${#fields.hasErrors('endTime')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{endTime}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-medium">Responsible Person</label>
                            <select class="form-select" th:field="*{responsibleMemberId}">
                                <option value="">— None —</option>
                                <option th:each="m : ${members}"
                                        th:value="${m.id}"
                                        th:text="${m.firstName} + ' ' + ${m.lastName} + '  ·  ' + ${m.phone}"></option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-medium">Remark</label>
                            <input type="text" class="form-control" th:field="*{remark}">
                        </div>

                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-1"></i>Update
                        </button>
                        <a th:href="${returnEventId != null ? '/event-programs/event/' + returnEventId : '/event-programs'}"
                           class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="page-scripts">
<script>
(function () {
    var rowCount = 0;

    function getMemberOptions() {
        return document.getElementById('memberSrc').innerHTML;
    }

    window.addProgramRow = function () {
        rowCount++;
        var container = document.getElementById('programRows');
        var div = document.createElement('div');
        div.className = 'program-row-card p-3 rounded-3 position-relative';
        div.style.cssText = 'background:#f8faff;border:1px solid #e0e7ff;';

        div.innerHTML =
            '<div class="d-flex align-items-center justify-content-between mb-3">' +
                '<span class="badge rounded-pill px-3 py-2" style="background:#4f46e5;color:#fff;font-size:0.78rem;">' +
                    '<i class="bi bi-layout-text-sidebar-reverse me-1"></i>Program ' + rowCount +
                '</span>' +
                '<button type="button" class="btn btn-sm btn-outline-danger px-2" onclick="removeRow(this)" title="Remove row">' +
                    '<i class="bi bi-x-lg"></i>' +
                '</button>' +
            '</div>' +

            '<div class="row g-3">' +

                '<div class="col-md-6">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Program Name <span class="text-danger">*</span></label>' +
                    '<input type="text" name="programNames" class="form-control form-control-sm" placeholder="e.g. Welcome Address" required>' +
                '</div>' +

                '<div class="col-md-6">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Responsible Person</label>' +
                    '<select name="responsibleMemberIds" class="form-select form-select-sm">' +
                        getMemberOptions() +
                    '</select>' +
                '</div>' +

                '<div class="col-12">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Description</label>' +
                    '<textarea name="programDescriptions" class="form-control form-control-sm" rows="2" placeholder="Brief description of this program segment..."></textarea>' +
                '</div>' +

                '<div class="col-md-4">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Start Time <span class="text-danger">*</span></label>' +
                    '<input type="time" name="startTimes" class="form-control form-control-sm" required>' +
                '</div>' +

                '<div class="col-md-4">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">End Time <span class="text-danger">*</span></label>' +
                    '<input type="time" name="endTimes" class="form-control form-control-sm" required>' +
                '</div>' +

                '<div class="col-md-4">' +
                    '<label class="form-label fw-medium" style="font-size:0.83rem;">Remark</label>' +
                    '<input type="text" name="remarks" class="form-control form-control-sm" placeholder="Optional note...">' +
                '</div>' +

            '</div>';

        container.appendChild(div);
        renumber();
    };

    window.removeRow = function (btn) {
        btn.closest('.program-row-card').remove();
        renumber();
    };

    function renumber() {
        var badges = document.querySelectorAll('#programRows .badge');
        badges.forEach(function (b, i) {
            b.innerHTML = '<i class="bi bi-layout-text-sidebar-reverse me-1"></i>Program ' + (i + 1);
        });
        rowCount = badges.length;
    }

    // Start with one row
    addProgramRow();
})();
</script>
</th:block>

</body>
</html>
