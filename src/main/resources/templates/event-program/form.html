<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
<title>Event Planning</title>
<style>
    .section-card { border:none; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-bottom:20px; overflow:hidden; }
    .section-hdr  { padding:12px 20px; display:flex; align-items:center; gap:10px; font-size:0.8rem; font-weight:700; letter-spacing:0.6px; text-transform:uppercase; }
    .section-hdr-blue   { background:linear-gradient(90deg,#eff6ff,#dbeafe); color:#1d4ed8; }
    .section-hdr-purple { background:linear-gradient(90deg,#f5f3ff,#ede9fe); color:#6d28d9; }
    .section-body { padding:20px; background:#fff; }

    .form-label { font-size:0.8rem; font-weight:600; color:#374151; margin-bottom:5px; }
    .form-control, .form-select { font-size:0.88rem; border-radius:8px; border:1.5px solid #e5e7eb; transition:border-color 0.18s,box-shadow 0.18s; }
    .form-control:focus, .form-select:focus { border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,0.1); }

    /* Program row card */
    .prog-row-card {
        background:#f8f7ff;
        border:1.5px solid #e0e7ff;
        border-radius:12px;
        padding:20px;
        position:relative;
        transition:border-color 0.15s;
    }
    .prog-row-card:hover { border-color:#a5b4fc; }
    .prog-row-num {
        display:inline-flex; align-items:center; gap:6px;
        background:linear-gradient(135deg,#4f46e5,#7c3aed);
        color:#fff; border-radius:20px; padding:4px 14px;
        font-size:0.75rem; font-weight:700;
    }
    .prog-remove-btn {
        position:absolute; top:14px; right:14px;
        width:28px; height:28px; border-radius:8px;
        border:1.5px solid #fecdd3; background:#fff6f7;
        color:#ef4444; display:flex; align-items:center; justify-content:center;
        cursor:pointer; transition:all 0.15s; font-size:0.85rem;
    }
    .prog-remove-btn:hover { background:#ef4444; color:#fff; border-color:#ef4444; }

    .time-input-wrap { position:relative; }
    .time-input-wrap i { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#94a3b8; font-size:0.85rem; pointer-events:none; }
    .time-input-with-icon { padding-left:30px !important; }

    .required-star { color:#ef4444; }
    .add-row-btn { border-radius:10px; font-weight:600; font-size:0.85rem; }

    /* Edit mode */
    .edit-summary {
        background:linear-gradient(135deg,#f0f9ff,#e0f2fe);
        border:1px solid #bae6fd; border-radius:12px; padding:16px 20px;
    }
</style>
</head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item == null ? 'Add Event Programs' : 'Edit Event Program'}">Event Program</th:block>

<div layout:fragment="content">

<!-- ══════════════════════════════════════════════════════
     CREATE MODE
════════════════════════════════════════════════════════ -->
<div th:if="${item == null}" style="max-width:900px;">

    <!-- Error -->
    <div th:if="${formError}"
         class="alert alert-danger d-flex align-items-center gap-2 mb-4" style="border-radius:10px;font-size:0.86rem;">
        <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
        <span th:text="${formError}"></span>
    </div>

    <form th:action="@{/event-programs}" method="post">

        <!-- Section 1: Select Event -->
        <div class="section-card">
            <div class="section-hdr section-hdr-blue">
                <i class="bi bi-calendar-event-fill"></i> Select Event
            </div>
            <div class="section-body">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Event <span class="required-star">*</span></label>
                        <select name="eventId" id="eventId" class="form-select" required>
                            <option value="">— Select an Event —</option>
                            <option th:each="e : ${events}"
                                    th:value="${e.id}"
                                    th:text="${e.eventName} + '  ·  ' + ${#temporals.format(e.eventDate,'dd/MM/yyyy')}"></option>
                        </select>
                        <div th:if="${#lists.isEmpty(events)}"
                             class="alert alert-warning d-flex align-items-center gap-2 mt-2 py-2 mb-0" style="font-size:0.82rem;border-radius:8px;">
                            <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
                            No events found. Please create an event first.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 2: Programme Rows -->
        <div class="section-card">
            <div class="section-hdr section-hdr-purple">
                <i class="bi bi-layout-text-sidebar-reverse"></i> Programme Schedule
                <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:0.75rem;opacity:0.7;">
                    — add one or more programme segments
                </span>
            </div>
            <div class="section-body">
                <div id="programRows" class="d-flex flex-column gap-3 mb-3"></div>
                <button type="button" class="btn btn-outline-primary add-row-btn" onclick="addProgramRow()">
                    <i class="bi bi-plus-lg me-2"></i>Add Another Programme
                </button>
            </div>
        </div>

        <!-- Hidden member options for JS -->
        <select id="memberSrc" style="display:none;">
            <option value="">— None —</option>
            <option th:each="m : ${members}"
                    th:value="${m.id}"
                    th:text="${m.firstName} + ' ' + ${m.lastName} + '  ·  ' + ${m.phone}"></option>
        </select>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-check-lg me-1"></i>Save All Programmes
            </button>
            <a th:href="@{/event-programs}" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left me-1"></i>Cancel
            </a>
        </div>

    </form>
</div>

<!-- ══════════════════════════════════════════════════════
     EDIT MODE
════════════════════════════════════════════════════════ -->
<div th:unless="${item == null}" style="max-width:680px;">

    <form th:action="@{/event-programs/{id}(id=${item.id})}"
          th:object="${item}" method="post">
        <input type="hidden" name="returnEventId" th:if="${returnEventId != null}" th:value="${returnEventId}">

        <!-- Event context banner -->
        <div class="edit-summary mb-4 d-flex align-items-center gap-3"
             th:if="${item.event != null}">
            <div style="width:40px;height:40px;border-radius:10px;background:#0ea5e9;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="bi bi-calendar-event-fill text-white"></i>
            </div>
            <div>
                <div class="fw-bold" style="color:#0c4a6e;" th:text="${item.event.eventName}"></div>
                <div style="font-size:0.76rem;color:#0369a1;">
                    <i class="bi bi-calendar3 me-1"></i>
                    <span th:text="${#temporals.format(item.event.eventDate,'dd/MM/yyyy')}"></span>
                    <span class="mx-2">·</span>
                    <i class="bi bi-geo-alt me-1"></i>
                    <span th:text="${item.event.venue}"></span>
                </div>
            </div>
        </div>

        <!-- Programme details -->
        <div class="section-card">
            <div class="section-hdr section-hdr-purple">
                <i class="bi bi-pencil-fill"></i> Edit Programme
            </div>
            <div class="section-body">
                <div class="row g-3">

                    <div class="col-12" th:if="${item.event == null}">
                        <label class="form-label">Event <span class="required-star">*</span></label>
                        <select class="form-select" th:field="*{eventId}"
                                th:classappend="${#fields.hasErrors('eventId')} ? ' is-invalid'">
                            <option value="">— Select Event —</option>
                            <option th:each="e : ${events}"
                                    th:value="${e.id}"
                                    th:text="${e.eventName} + '  ·  ' + ${#temporals.format(e.eventDate,'dd/MM/yyyy')} + '  [' + ${e.status} + ']'"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{eventId}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Programme Name <span class="required-star">*</span></label>
                        <input type="text" class="form-control" th:field="*{programName}"
                               placeholder="e.g. Welcome Address, Puja Ceremony…"
                               th:classappend="${#fields.hasErrors('programName')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{programName}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" th:field="*{programDescription}" rows="2"
                                  placeholder="Brief description of this programme segment…"></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Start Time <span class="required-star">*</span></label>
                        <div class="time-input-wrap">
                            <i class="bi bi-clock"></i>
                            <input type="time" class="form-control time-input-with-icon" th:field="*{startTime}"
                                   th:classappend="${#fields.hasErrors('startTime')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{startTime}"></div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">End Time <span class="required-star">*</span></label>
                        <div class="time-input-wrap">
                            <i class="bi bi-clock-fill"></i>
                            <input type="time" class="form-control time-input-with-icon" th:field="*{endTime}"
                                   th:classappend="${#fields.hasErrors('endTime')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{endTime}"></div>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Responsible Person</label>
                        <select class="form-select" th:field="*{responsibleMemberId}">
                            <option value="">— None —</option>
                            <option th:each="m : ${members}"
                                    th:value="${m.id}"
                                    th:text="${m.firstName} + ' ' + ${m.lastName} + '  ·  ' + ${m.phone}"></option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Remark</label>
                        <input type="text" class="form-control" th:field="*{remark}"
                               placeholder="Optional note about this programme…">
                    </div>

                </div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-check-lg me-1"></i>Save Changes
            </button>
            <a th:href="${returnEventId != null ? '/event-programs/event/' + returnEventId : '/event-programs'}"
               class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left me-1"></i>Cancel
            </a>
        </div>

    </form>
</div>

</div>

<th:block layout:fragment="page-scripts">
<script>
(function () {
    var rowCount = 0;

    function getMemberOptions() {
        return document.getElementById('memberSrc').innerHTML;
    }

    window.addProgramRow = function () {
        rowCount++;
        var container = document.getElementById('programRows');
        var div = document.createElement('div');
        div.className = 'prog-row-card';

        div.innerHTML =
            '<button type="button" class="prog-remove-btn" onclick="removeRow(this)" title="Remove">' +
                '<i class="bi bi-x-lg"></i>' +
            '</button>' +

            '<div class="d-flex align-items-center gap-2 mb-3">' +
                '<span class="prog-row-num">' +
                    '<i class="bi bi-layout-text-sidebar-reverse"></i>' +
                    'Programme ' + rowCount +
                '</span>' +
            '</div>' +

            '<div class="row g-3">' +

                '<div class="col-md-6">' +
                    '<label class="form-label">Name <span class="required-star">*</span></label>' +
                    '<input type="text" name="programNames" class="form-control" placeholder="e.g. Welcome Address" required>' +
                '</div>' +

                '<div class="col-md-6">' +
                    '<label class="form-label">Responsible Person</label>' +
                    '<select name="responsibleMemberIds" class="form-select">' +
                        getMemberOptions() +
                    '</select>' +
                '</div>' +

                '<div class="col-12">' +
                    '<label class="form-label">Description</label>' +
                    '<textarea name="programDescriptions" class="form-control" rows="2" placeholder="Brief description…"></textarea>' +
                '</div>' +

                '<div class="col-md-4">' +
                    '<label class="form-label">Start Time <span class="required-star">*</span></label>' +
                    '<div class="time-input-wrap">' +
                        '<i class="bi bi-clock"></i>' +
                        '<input type="time" name="startTimes" class="form-control time-input-with-icon" required>' +
                    '</div>' +
                '</div>' +

                '<div class="col-md-4">' +
                    '<label class="form-label">End Time <span class="required-star">*</span></label>' +
                    '<div class="time-input-wrap">' +
                        '<i class="bi bi-clock-fill"></i>' +
                        '<input type="time" name="endTimes" class="form-control time-input-with-icon" required>' +
                    '</div>' +
                '</div>' +

                '<div class="col-md-4">' +
                    '<label class="form-label">Remark</label>' +
                    '<input type="text" name="remarks" class="form-control" placeholder="Optional note…">' +
                '</div>' +

            '</div>';

        container.appendChild(div);
        renumber();
    };

    window.removeRow = function (btn) {
        btn.closest('.prog-row-card').remove();
        renumber();
    };

    function renumber() {
        document.querySelectorAll('#programRows .prog-row-num').forEach(function (el, i) {
            el.innerHTML = '<i class="bi bi-layout-text-sidebar-reverse"></i> Programme ' + (i + 1);
        });
        rowCount = document.querySelectorAll('#programRows .prog-row-card').length;
    }

    addProgramRow();
})();
</script>
</th:block>

</body>
</html>
