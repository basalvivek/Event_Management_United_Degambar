<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Event Schedule</title></head>
<body>

<th:block layout:fragment="page-title" th:text="${event.eventName} + ' — Schedule'">Event Schedule</th:block>

<div layout:fragment="content">

    <!-- Event header card -->
    <div class="card border-0 shadow-sm mb-4" style="border-radius:14px;overflow:hidden;">
        <div style="height:4px;background:linear-gradient(90deg,#4f46e5 0%,#7c3aed 100%);"></div>
        <div class="card-body px-4 py-3">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center justify-content-center rounded-circle flex-shrink-0"
                         style="width:44px;height:44px;background:linear-gradient(135deg,#4f46e5,#7c3aed);">
                        <i class="bi bi-calendar-event-fill text-white" style="font-size:1.1rem;"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0" style="color:#1e293b;" th:text="${event.eventName}"></h5>
                        <div class="d-flex align-items-center gap-3 mt-1 flex-wrap">
                            <span class="text-muted" style="font-size:0.8rem;">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span th:text="${#temporals.format(event.eventDate,'dd/MM/yyyy')}"></span>
                                <span th:if="${event.endDate != null}"
                                      th:text="' – ' + ${#temporals.format(event.endDate,'dd/MM/yyyy')}"></span>
                            </span>
                            <span class="text-muted" style="font-size:0.8rem;">
                                <i class="bi bi-geo-alt me-1"></i>
                                <span th:text="${event.venue}"></span>
                            </span>
                            <span class="text-muted" style="font-size:0.8rem;">
                                <i class="bi bi-tag me-1"></i>
                                <span th:text="${event.eventType}"></span>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span th:with="s=${event.status}"
                          th:class="${s == 'Active'} ? 'badge bg-success px-3 py-2' : (${s == 'Planned'} ? 'badge bg-primary px-3 py-2' : (${s == 'Completed'} ? 'badge bg-secondary px-3 py-2' : 'badge bg-danger px-3 py-2'))"
                          style="font-size:0.8rem;" th:text="${event.status}"></span>
                    <a th:href="@{/event-programs/new(eventId=${event.id})}" class="btn btn-primary btn-sm">
                        <i class="bi bi-plus-lg me-1"></i>Add More Programs
                    </a>
                    <!-- Quick status change -->
                    <form th:action="@{/events/{id}/status(id=${event.id})}" method="post" class="d-flex gap-1 align-items-center">
                        <input type="hidden" name="returnTo" th:value="'event-programs/event/' + ${event.id}">
                        <select name="status" class="form-select form-select-sm" style="border-radius:8px;font-size:.75rem;min-width:100px;">
                            <option value="Planned"   th:selected="${event.status == 'Planned'}">Planned</option>
                            <option value="Active"    th:selected="${event.status == 'Active'}">Active</option>
                            <option value="Completed" th:selected="${event.status == 'Completed'}">Completed</option>
                            <option value="Cancelled" th:selected="${event.status == 'Cancelled'}">Cancelled</option>
                        </select>
                        <button type="submit" class="btn btn-outline-secondary btn-sm" title="Update status">
                            <i class="bi bi-check-lg"></i>
                        </button>
                    </form>
                    <a th:href="@{/event-programs}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Program count summary -->
    <div class="d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-layout-text-sidebar-reverse text-primary"></i>
        <span class="fw-semibold" style="color:#1e293b;">
            Program Schedule
        </span>
        <span class="badge rounded-pill"
              style="background:#eef2ff;color:#4f46e5;font-size:0.72rem;"
              th:text="${#lists.size(programs)} + ' program' + (${#lists.size(programs)} != 1 ? 's' : '')"></span>
    </div>

    <!-- Schedule timeline -->
    <div th:if="${not #lists.isEmpty(programs)}" class="d-flex flex-column gap-3">
        <div th:each="prog, stat : ${programs}"
             class="card border-0 shadow-sm"
             style="border-radius:12px;overflow:hidden;">

            <div class="d-flex">
                <!-- Time column -->
                <div class="d-flex flex-column align-items-center justify-content-center flex-shrink-0 px-3 py-3"
                     style="min-width:90px;background:linear-gradient(160deg,#4f46e5,#7c3aed);color:#fff;">
                    <span style="font-size:1rem;font-weight:700;line-height:1.2;"
                          th:text="${#temporals.format(prog.startTime,'HH:mm')}"></span>
                    <span style="font-size:0.65rem;opacity:0.7;margin:2px 0;">to</span>
                    <span style="font-size:0.85rem;font-weight:600;line-height:1.2;"
                          th:text="${#temporals.format(prog.endTime,'HH:mm')}"></span>
                </div>

                <!-- Content column -->
                <div class="card-body py-3 px-4 flex-grow-1">

                    <!-- Program name + sequence badge -->
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="badge rounded-pill"
                              style="background:#eef2ff;color:#4f46e5;font-size:0.67rem;"
                              th:text="'#' + ${stat.count}"></span>
                        <h6 class="fw-bold mb-0" style="font-size:0.92rem;color:#1e293b;"
                            th:text="${prog.programName}"></h6>
                    </div>

                    <!-- Responsible person -->
                    <div th:if="${prog.responsibleMember != null}"
                         class="d-flex align-items-center gap-2 mb-1">
                        <i class="bi bi-person-fill" style="font-size:0.78rem;color:#4f46e5;"></i>
                        <span style="font-size:0.8rem;color:#475569;"
                              th:text="${prog.responsibleMember.firstName} + ' ' + ${prog.responsibleMember.lastName}"></span>
                    </div>

                    <!-- Description -->
                    <p th:if="${prog.programDescription != null and !prog.programDescription.isEmpty()}"
                       class="text-muted mb-1"
                       style="font-size:0.8rem;line-height:1.5;"
                       th:text="${prog.programDescription}"></p>

                    <!-- Remark -->
                    <div th:if="${prog.remark != null and !prog.remark.isEmpty()}"
                         class="d-inline-flex align-items-center gap-1 px-2 py-1 rounded-2 mb-2"
                         style="background:#f8faff;font-size:0.75rem;color:#64748b;">
                        <i class="bi bi-chat-dots" style="color:#4f46e5;font-size:0.72rem;"></i>
                        <span th:text="${prog.remark}"></span>
                    </div>


                </div>
            </div>

        </div>
    </div>

    <div th:if="${#lists.isEmpty(programs)}"
         class="text-center text-muted py-5">
        <i class="bi bi-calendar-x" style="font-size:2rem;opacity:0.35;display:block;margin-bottom:8px;"></i>
        No programs added yet.
        <a th:href="@{/event-programs/new}" class="ms-1">Add the first program.</a>
    </div>

</div>
</body>
</html>
