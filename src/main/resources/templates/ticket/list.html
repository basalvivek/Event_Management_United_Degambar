<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Event Ticket Payments</title></head>
<body>

<th:block layout:fragment="page-title">Event Ticket Payments</th:block>

<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Event Ticket Payments</h5>
        <span class="badge rounded-pill px-3 py-2"
              style="background:#eef2ff;color:#4f46e5;font-size:0.78rem;"
              th:text="${#lists.size(tickets)} + ' record' + (${#lists.size(tickets)} != 1 ? 's' : '')"></span>
    </div>

    <!-- Filters -->
    <div class="card shadow-sm border-0 mb-3" style="border-radius:12px;">
        <div class="card-body px-4 py-3">
            <form method="get" th:action="@{/ticket-payments}" class="row g-2 align-items-end">
                <div class="col-md-5">
                    <label class="form-label fw-medium" style="font-size:0.82rem;">Filter by Event</label>
                    <select name="eventId" class="form-select form-select-sm">
                        <option value="">— All Events —</option>
                        <option th:each="ev : ${events}"
                                th:value="${ev.id}"
                                th:text="${ev.eventName} + ' (' + ${ev.status} + ')'"
                                th:selected="${selectedEventId != null and selectedEventId == ev.id}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-medium" style="font-size:0.82rem;">Filter by Status</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">— All Statuses —</option>
                        <option value="Pending"  th:selected="${selectedStatus == 'Pending'}">Pending</option>
                        <option value="Accepted" th:selected="${selectedStatus == 'Accepted'}">Accepted</option>
                        <option value="Rejected" th:selected="${selectedStatus == 'Rejected'}">Rejected</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary btn-sm w-100">
                        <i class="bi bi-funnel me-1"></i>Apply
                    </button>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/ticket-payments}" class="btn btn-outline-secondary btn-sm w-100">
                        <i class="bi bi-x me-1"></i>Clear
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Member</th>
                        <th>Event</th>
                        <th class="text-center">Adults</th>
                        <th class="text-center">Younger</th>
                        <th class="text-center">Children</th>
                        <th class="text-end">Total (£)</th>
                        <th>Status</th>
                        <th>Submitted</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t, stat : ${tickets}">
                        <td class="text-muted" th:text="${stat.count}"></td>
                        <td>
                            <div class="fw-medium" th:text="${t.member.firstName + ' ' + t.member.lastName}"></div>
                            <div class="text-muted" style="font-size:0.73rem;"
                                 th:text="${t.member.email != null ? t.member.email : t.member.phone}"></div>
                        </td>
                        <td>
                            <div class="fw-medium" th:text="${t.event.eventName}"></div>
                            <div class="text-muted" style="font-size:0.73rem;"
                                 th:text="${#temporals.format(t.event.eventDate,'dd-MMM-yyyy')}"></div>
                        </td>
                        <td class="text-center" th:text="${t.adultCount}"></td>
                        <td class="text-center" th:text="${t.youngerCount}"></td>
                        <td class="text-center" th:text="${t.childCount}"></td>
                        <td class="text-end fw-semibold" th:text="${t.totalAmount}"></td>
                        <td>
                            <span th:with="s=${t.status}"
                                  th:class="${s == 'Accepted'} ? 'badge bg-success' :
                                            (${s == 'Rejected'} ? 'badge bg-danger' : 'badge bg-warning text-dark')"
                                  th:text="${s}"></span>
                        </td>
                        <td style="font-size:0.78rem;color:#64748b;"
                            th:text="${#temporals.format(t.createdAt,'dd-MMM-yyyy')}"></td>
                        <td class="text-end">
                            <form th:if="${t.status == 'Pending'}"
                                  th:action="@{/ticket-payments/{id}/approve(id=${t.id})}" method="post"
                                  class="d-inline">
                                <button type="submit" class="btn btn-sm btn-success">
                                    <i class="bi bi-check-lg me-1"></i>Accept
                                </button>
                            </form>
                            <form th:if="${t.status == 'Pending'}"
                                  th:action="@{/ticket-payments/{id}/reject(id=${t.id})}" method="post"
                                  class="d-inline" data-confirm="Reject this registration?">
                                <button type="submit" class="btn btn-sm btn-outline-danger ms-1">
                                    <i class="bi bi-x-lg me-1"></i>Reject
                                </button>
                            </form>
                            <span th:unless="${t.status == 'Pending'}"
                                  class="text-muted" style="font-size:0.78rem;">—</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tickets)}">
                        <td colspan="10" class="text-center text-muted py-4">No records found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Totals summary -->
    <div th:if="${not #lists.isEmpty(tickets)}" class="mt-3 text-end text-muted" style="font-size:0.82rem;">
        Total amount shown:
        <strong style="color:#1e293b;">£<span th:text="${totalShown}"></span></strong>
    </div>

</div>
</body>
</html>
