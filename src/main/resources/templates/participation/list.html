<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Participation Organization</title></head>
<body>

<th:block layout:fragment="page-title">Participation Organization</th:block>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Participation Organization</h5>
        <a th:href="@{/participations/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Add New
        </a>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Event</th>
                        <th>Organization</th>
                        <th>Type</th>
                        <th>Members</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item, stat : ${items}">
                        <td class="text-muted" th:text="${stat.count}"></td>
                        <td class="fw-medium" th:text="${item.event.eventName}"></td>
                        <td th:text="${item.supportiveOrganization.name}"></td>
                        <td><span class="badge bg-primary bg-opacity-75" th:text="${item.participationType}"></span></td>
                        <td>
                            <span th:if="${item.members.size() > 0}"
                                  class="badge bg-info text-dark"
                                  th:text="${item.members.size()} + ' member(s)'"></span>
                            <span th:if="${item.members.size() == 0}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span th:with="sc=${item.status == 'Confirmed'} ? 'bg-success' : (${item.status == 'Cancelled'} ? 'bg-danger' : 'bg-secondary')"
                                  th:class="'badge ' + ${sc}"
                                  th:text="${item.status}"></span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/participations/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/participations/{id}/delete(id=${item.id})}" method="post" class="d-inline"
                                  data-confirm='Delete this record?'>
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="7" class="text-center text-muted py-4">No participation records found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
