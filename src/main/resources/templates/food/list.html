<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Food Registration</title></head>
<body>
<th:block layout:fragment="page-title">Food Registration</th:block>
<div layout:fragment="content">
<style>
.fd-table th{font-size:.7rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#6366f1;padding:11px 14px;background:#f8f7ff;border-bottom:2px solid #e0e7ff;}
.fd-table td{padding:11px 14px;vertical-align:middle;border-color:#f1f5f9;font-size:.83rem;}
.fd-row{transition:background .1s;}.fd-row:hover{background:#fafafe;}
.fd-row.ps-Completed{border-left:3px solid #059669;}
.fd-row.ps-InProgress{border-left:3px solid #f59e0b;}
.ps-Completed{background:#dcfce7;color:#166534;}
.ps-InProgress{background:#fef3c7;color:#92400e;}
.fs-OPEN{background:#e0f2fe;color:#0c4a6e;}
.fs-INPROGRESS{background:#dbeafe;color:#1e40af;}
.fs-HOLD{background:#fef3c7;color:#92400e;}
.fs-REJECTED{background:#fee2e2;color:#991b1b;}
.fs-ACCEPTED{background:#dcfce7;color:#166534;}
.st-tag{display:inline-flex;align-items:center;border-radius:20px;padding:2px 10px;font-size:.7rem;font-weight:700;}
.grp-row td{background:linear-gradient(90deg,#eef2ff,#f5f3ff);border-bottom:2px solid #c7d2fe;padding:8px 14px;}
.fp{border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:600;border:1.5px solid #e5e7eb;background:#fff;color:#475569;cursor:pointer;transition:all .15s;}
.fp:hover{border-color:#6366f1;color:#6366f1;}
.fp.fa{background:#1e1b4b;border-color:#1e1b4b;color:#fff;}
.fp.fp-done.fa{background:#059669;border-color:#059669;}
.fp.fp-ip.fa{background:#d97706;border-color:#d97706;}
.sw{position:relative;}.sw i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.8rem;}
.sb{border-radius:20px;border:1.5px solid #e5e7eb;padding:6px 14px 6px 32px;font-size:.84rem;width:220px;}
.sb:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1);outline:none;}
.amt{font-family:monospace;font-weight:700;}
</style>

<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
    <div>
        <h5 class="fw-bold mb-0" style="color:#1e1b4b;">Food Registration</h5>
        <p class="text-muted mb-0" style="font-size:.78rem;">Grouped by event — click <i class="bi bi-plus-circle text-primary"></i> to view partial payments</p>
    </div>
    <a th:href="@{/food-registrations/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Registration</a>
</div>

<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div class="d-flex gap-2 flex-wrap">
        <span class="fp fa" onclick="fdfilter('all',this)">All</span>
        <span class="fp fp-ip"   onclick="fdfilter('InProgress',this)"><i class="bi bi-circle-fill me-1" style="font-size:.45rem;color:#d97706;"></i>In Progress</span>
        <span class="fp fp-done" onclick="fdfilter('Completed',this)"><i class="bi bi-circle-fill me-1" style="font-size:.45rem;color:#059669;"></i>Completed</span>
    </div>
    <div class="sw"><i class="bi bi-search"></i>
        <input type="text" class="sb form-control" id="fdSearch" placeholder="Search vendor…" oninput="fdsearch(this.value)">
    </div>
</div>

<div class="card border-0 shadow-sm" style="border-radius:14px;overflow:hidden;">
    <div class="table-responsive">
        <table class="table fd-table mb-0" id="fdTable">
            <thead><tr>
                <th style="width:32px;"></th>
                <th style="width:32px;">#</th>
                <th>Vendor</th>
                <th>Heads</th>
                <th>£/Plate</th>
                <th class="text-end">Full Amt</th>
                <th>Rating</th>
                <th class="text-end">Total Paid</th>
                <th class="text-end">Remaining</th>
                <th>Food Status</th>
                <th>Payment</th>
                <th class="text-end" style="padding-right:16px;">Actions</th>
            </tr></thead>

            <!-- One tbody per event group -->
            <tbody th:each="group : ${groups}" class="fd-group">

                <!-- Event header -->
                <tr class="grp-row">
                    <td colspan="12">
                        <div class="d-flex align-items-center gap-2">
                            <span style="width:26px;height:26px;border-radius:7px;background:#4f46e5;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <i class="bi bi-calendar-event-fill text-white" style="font-size:.65rem;"></i>
                            </span>
                            <span style="font-weight:700;font-size:.82rem;color:#3730a3;" th:text="${group.key}"></span>
                            <span class="ms-1" style="background:#e0e7ff;color:#4338ca;border-radius:20px;padding:2px 9px;font-size:.68rem;font-weight:700;"
                                  th:text="${#lists.size(group.value)} + ' vendor' + (${#lists.size(group.value)} > 1 ? 's' : '')"></span>
                        </div>
                    </td>
                </tr>

                <!-- One summary row per food registration -->
                <th:block th:each="f, stat : ${group.value}">

                    <tr th:class="'fd-row ps-' + ${f.paymentStatus}"
                        th:attr="data-s=${f.paymentStatus},data-q=${((f.vendorName != null ? f.vendorName : '') + ' ' + (f.postcode != null ? f.postcode : '') + ' ' + group.key).toLowerCase()}">

                        <!-- Expand toggle (only if instalments exist) -->
                        <td style="width:32px;text-align:center;padding:11px 6px;">
                            <span th:if="${not #lists.isEmpty(instalmentMap[f.id])}"
                                  class="toggle-btn" th:attr="data-bid=${f.id}"
                                  onclick="toggleInst(this)"
                                  style="cursor:pointer;width:22px;height:22px;border-radius:6px;background:#eef2ff;color:#4f46e5;display:inline-flex;align-items:center;justify-content:center;font-size:.8rem;border:1.5px solid #c7d2fe;transition:all .15s;">
                                <i class="bi bi-plus-lg"></i>
                            </span>
                        </td>

                        <td class="text-muted fw-medium" th:text="${stat.count}"></td>

                        <td>
                            <div class="fw-semibold" style="color:#1e1b4b;" th:text="${f.vendorName}"></div>
                            <div th:if="${f.postcode != null}" style="font-size:.72rem;color:#94a3b8;">
                                <i class="bi bi-geo-alt me-1"></i><span th:text="${f.postcode}"></span>
                            </div>
                        </td>

                        <td th:text="${f.totalExpectedHeadCount != null ? f.totalExpectedHeadCount : '—'}"></td>

                        <td class="amt" style="color:#64748b;"
                            th:text="${f.finalPricePerPlate != null ? '£' + #numbers.formatDecimal(f.finalPricePerPlate,1,2) : '—'}"></td>

                        <td class="text-end amt" style="color:#1e1b4b;"
                            th:text="${f.fullAmount != null ? '£' + #numbers.formatDecimal(f.fullAmount,1,'COMMA',2,'POINT') : '—'}"></td>

                        <td>
                            <span th:if="${f.overallFoodRating != null}" class="fw-bold" style="color:#f59e0b;">
                                ★ <span th:text="${f.overallFoodRating}"></span>/5
                            </span>
                            <span th:unless="${f.overallFoodRating != null}" class="text-muted">—</span>
                        </td>

                        <td class="text-end amt" style="color:#059669;"
                            th:text="${totalPaidMap[f.id] != null ? '£' + #numbers.formatDecimal(totalPaidMap[f.id],1,'COMMA',2,'POINT') : '—'}"></td>

                        <td class="text-end amt"
                            th:style="${remainingMap[f.id] != null and remainingMap[f.id].compareTo(T(java.math.BigDecimal).ZERO) > 0} ? 'color:#dc2626;' : 'color:#94a3b8;'"
                            th:text="${remainingMap[f.id] != null ? '£' + #numbers.formatDecimal(remainingMap[f.id],1,'COMMA',2,'POINT') : '—'}"></td>

                        <td><span th:class="'st-tag fs-' + ${f.foodSelectionStatus}" th:text="${f.foodSelectionStatus}"></span></td>

                        <td><span th:class="'st-tag ps-' + ${f.paymentStatus}" th:text="${f.paymentStatus}"></span></td>

                        <td class="text-end" style="padding-right:16px;white-space:nowrap;">
                            <a th:href="@{/food-registrations/{id}/edit(id=${f.id})}" class="btn btn-sm btn-outline-warning me-1">
                                <i class="bi bi-pencil-fill"></i>
                            </a>
                        </td>
                    </tr>

                    <!-- Instalment rows (hidden by default) -->
                    <tr th:each="inst, is : ${instalmentMap[f.id]}"
                        th:attr="data-inst-bid=${f.id}"
                        style="display:none;background:#f8faff;">
                        <td></td>
                        <td class="text-muted" style="font-size:.72rem;padding-left:20px;" th:text="${is.count}"></td>
                        <td colspan="2" style="font-size:.78rem;color:#475569;padding-left:28px;">
                            <i class="bi bi-arrow-return-right me-1" style="color:#94a3b8;"></i>
                            <span class="badge bg-light text-dark border" th:text="${inst.paymentMode != null ? inst.paymentMode : '—'}"></span>
                            <span class="ms-1 text-muted" th:if="${inst.notes != null and !#strings.isEmpty(inst.notes)}" th:text="${inst.notes}"></span>
                        </td>
                        <td style="font-size:.78rem;color:#374151;font-weight:600;"
                            th:text="${inst.paymentDate != null ? #temporals.format(inst.paymentDate,'dd/MM/yyyy') : '—'}"></td>
                        <td></td>
                        <td></td>
                        <td class="text-end amt" style="color:#059669;font-size:.78rem;"
                            th:text="${'£' + #numbers.formatDecimal(inst.amount,1,'COMMA',2,'POINT')}"></td>
                        <td colspan="4"></td>
                    </tr>

                    <!-- Initial deposit row (shown when expanded and deposit > 0) -->
                    <tr th:if="${f.depositAmount != null and f.depositAmount > 0 and not #lists.isEmpty(instalmentMap[f.id])}"
                        th:attr="data-inst-bid=${f.id}"
                        style="display:none;background:#f0fdf4;">
                        <td></td>
                        <td class="text-muted" style="font-size:.72rem;">—</td>
                        <td colspan="2" style="font-size:.78rem;color:#166534;padding-left:28px;">
                            <i class="bi bi-arrow-return-right me-1" style="color:#94a3b8;"></i>
                            <span class="badge" style="background:#dcfce7;color:#166534;border:1px solid #bbf7d0;">Initial Deposit</span>
                            <span class="ms-1 text-muted" style="font-size:.7rem;"
                                  th:if="${f.depositDate != null}" th:text="${#temporals.format(f.depositDate,'dd/MM/yyyy')}"></span>
                        </td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td class="text-end amt" style="color:#059669;font-size:.78rem;"
                            th:text="${'£' + #numbers.formatDecimal(f.depositAmount,1,'COMMA',2,'POINT')}"></td>
                        <td colspan="4"></td>
                    </tr>

                </th:block>
            </tbody>

            <tbody>
                <tr id="fdEmpty" style="display:none;"><td colspan="12" class="text-center py-4 text-muted">No records match</td></tr>
                <tr th:if="${#maps.isEmpty(groups)}">
                    <td colspan="12" class="text-center py-5">
                        <i class="bi bi-cup-hot d-block mb-2" style="font-size:2.5rem;color:#c7d2fe;"></i>
                        <div class="fw-semibold text-muted">No food registrations yet</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</div>
<th:block layout:fragment="page-scripts"><script>
var fdf='all';
function fdfilter(s,p){fdf=s;document.querySelectorAll('.fp').forEach(function(x){x.classList.remove('fa');});p.classList.add('fa');fddof();}
function fdsearch(q){fddof(q);}
function fddof(q){
    q=(q!==undefined?q:document.getElementById('fdSearch').value).toLowerCase();
    var totalV=0;
    document.querySelectorAll('#fdTable tbody.fd-group').forEach(function(grp){
        var gv=0;
        grp.querySelectorAll('tr.fd-row').forEach(function(r){
            var ok=(fdf==='all'||r.dataset.s===fdf)&&(!q||r.dataset.q.includes(q));
            r.style.display=ok?'':'none';
            if(ok)gv++;
        });
        grp.querySelector('tr.grp-row').style.display=gv>0?'':'none';
        totalV+=gv;
    });
    var all=document.querySelectorAll('#fdTable tbody.fd-group tr.fd-row');
    document.getElementById('fdEmpty').style.display=(totalV===0&&all.length>0)?'':'none';
}
function toggleInst(btn){
    var bid=btn.dataset.bid;
    var rows=document.querySelectorAll('tr[data-inst-bid="'+bid+'"]');
    var icon=btn.querySelector('i');
    var expanded=icon.classList.contains('bi-dash-lg');
    rows.forEach(function(r){r.style.display=expanded?'none':'table-row';});
    if(expanded){
        icon.classList.replace('bi-dash-lg','bi-plus-lg');
        btn.style.background='#eef2ff'; btn.style.color='#4f46e5';
    } else {
        icon.classList.replace('bi-plus-lg','bi-dash-lg');
        btn.style.background='#4f46e5'; btn.style.color='#fff';
    }
}
</script></th:block>
</body></html>
