<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Activities Progress</title></head>
<body>
<th:block layout:fragment="page-title">Activities Progress</th:block>
<div layout:fragment="content">
<style>
.pr-table th{font-size:.7rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#6366f1;padding:11px 14px;background:#f8f7ff;border-bottom:2px solid #e0e7ff;}
.pr-table td{padding:12px 14px;vertical-align:middle;border-color:#f1f5f9;}
.pr-row{transition:background .1s;}
.pr-row:hover{background:#fafafe;}
.pr-row.s-Completed{border-left:3px solid #059669;}
.pr-row.s-On-Track{border-left:3px solid #3b82f6;}
.pr-row.s-At-Risk{border-left:3px solid #ef4444;}
.pr-row.s-Delayed{border-left:3px solid #f59e0b;}
.st-Completed{background:#dcfce7;color:#166534;}
.st-On-Track{background:#dbeafe;color:#1e40af;}
.st-At-Risk{background:#fee2e2;color:#991b1b;}
.st-Delayed{background:#fef3c7;color:#92400e;}
.st-tag{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 12px;font-size:.72rem;font-weight:700;}
.fp{border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:600;border:1.5px solid #e5e7eb;background:#fff;color:#475569;cursor:pointer;transition:all .15s;}
.fp:hover{border-color:#6366f1;color:#6366f1;}
.fp.fa{background:#1e1b4b;border-color:#1e1b4b;color:#fff;}
.fp.fp-done.fa{background:#059669;border-color:#059669;}
.fp.fp-track.fa{background:#3b82f6;border-color:#3b82f6;}
.fp.fp-risk.fa{background:#ef4444;border-color:#ef4444;}
.fp.fp-delay.fa{background:#d97706;border-color:#d97706;}
.pbar{height:8px;border-radius:4px;overflow:hidden;background:#e2e8f0;min-width:90px;}
.pbar-fill{height:100%;border-radius:4px;transition:width .3s;}
.pbar-fill.p-high{background:linear-gradient(90deg,#059669,#34d399);}
.pbar-fill.p-mid{background:linear-gradient(90deg,#3b82f6,#60a5fa);}
.pbar-fill.p-low{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.pbar-fill.p-crit{background:linear-gradient(90deg,#ef4444,#f87171);}
.sw{position:relative;}.sw i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.8rem;}
.sb{border-radius:20px;border:1.5px solid #e5e7eb;padding:6px 14px 6px 32px;font-size:.84rem;width:220px;}
.sb:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1);outline:none;}
</style>

<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
    <div>
        <h5 class="fw-bold mb-0" style="color:#1e1b4b;">Activities Progress</h5>
        <p class="text-muted mb-0" style="font-size:.78rem;">Track progress and milestones for each activity</p>
    </div>
    <a th:href="@{/progress/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Progress</a>
</div>

<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div class="d-flex gap-2 flex-wrap">
        <span class="fp fa" onclick="prfilter('all',this)">All <span class="ms-1 badge rounded-pill text-bg-dark" style="font-size:.65rem;" th:text="${#lists.size(items)}"></span></span>
        <span class="fp fp-track"  onclick="prfilter('On Track',this)"><i class="bi bi-circle-fill me-1" style="font-size:.45rem;color:#3b82f6;"></i>On Track</span>
        <span class="fp fp-risk"   onclick="prfilter('At Risk',this)"><i class="bi bi-circle-fill me-1" style="font-size:.45rem;color:#ef4444;"></i>At Risk</span>
        <span class="fp fp-delay"  onclick="prfilter('Delayed',this)"><i class="bi bi-circle-fill me-1" style="font-size:.45rem;color:#d97706;"></i>Delayed</span>
        <span class="fp fp-done"   onclick="prfilter('Completed',this)"><i class="bi bi-circle-fill me-1" style="font-size:.45rem;color:#059669;"></i>Completed</span>
    </div>
    <div class="sw"><i class="bi bi-search"></i><input type="text" class="sb form-control" id="prSearch" placeholder="Search activity…" oninput="prsearch(this.value)"></div>
</div>

<div class="card border-0 shadow-sm" style="border-radius:14px;overflow:hidden;">
    <div class="table-responsive">
        <table class="table pr-table mb-0" id="prTable">
            <thead><tr>
                <th style="width:36px;">#</th>
                <th>Activity</th>
                <th>Date</th>
                <th style="min-width:160px;">Progress</th>
                <th>Milestone</th>
                <th>Recorded By</th>
                <th>Status</th>
                <th class="text-end" style="padding-right:16px;">Actions</th>
            </tr></thead>
            <tbody>
                <tr th:each="item, stat : ${items}"
                    th:class="'pr-row s-' + ${item.status.replace(' ','-')}"
                    th:attr="data-s=${item.status}, data-q=${item.activity.activityName.toLowerCase()}">
                    <td class="text-muted fw-medium" th:text="${stat.count}"></td>
                    <td>
                        <div class="fw-semibold" style="font-size:.88rem;color:#1e1b4b;" th:text="${item.activity.activityName}"></div>
                    </td>
                    <td>
                        <div style="font-size:.8rem;">
                            <i class="bi bi-calendar3 me-1" style="color:#94a3b8;font-size:.72rem;"></i>
                            <span th:text="${#temporals.format(item.progressDate,'dd MMM yyyy')}"></span>
                        </div>
                    </td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="pbar flex-grow-1">
                                <div th:class="'pbar-fill ' + (${item.progressPercentage == 100} ? 'p-high' : (${item.progressPercentage >= 60} ? 'p-mid' : (${item.progressPercentage >= 30} ? 'p-low' : 'p-crit')))"
                                     th:style="'width:' + ${item.progressPercentage} + '%'"></div>
                            </div>
                            <span class="fw-bold" style="font-size:.8rem;color:#1e1b4b;min-width:30px;" th:text="${item.progressPercentage} + '%'"></span>
                        </div>
                    </td>
                    <td style="font-size:.8rem;color:#64748b;" th:text="${item.milestone != null ? item.milestone : '—'}"></td>
                    <td style="font-size:.8rem;color:#64748b;" th:text="${item.recordedBy != null ? item.recordedBy : '—'}"></td>
                    <td><span th:class="'st-tag st-' + ${item.status.replace(' ','-')}" th:text="${item.status}"></span></td>
                    <td class="text-end" style="padding-right:16px;white-space:nowrap;">
                        <a th:href="@{/progress/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-warning me-1"><i class="bi bi-pencil-fill"></i></a>
                        <form th:action="@{/progress/{id}/delete(id=${item.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this progress record?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash-fill"></i></button>
                        </form>
                    </td>
                </tr>
                <tr id="prEmpty" style="display:none;"><td colspan="8" class="text-center py-4 text-muted">No records match</td></tr>
                <tr th:if="${#lists.isEmpty(items)}"><td colspan="8" class="text-center py-5"><i class="bi bi-bar-chart-steps d-block mb-2" style="font-size:2.5rem;color:#c7d2fe;"></i><div class="fw-semibold text-muted">No progress records yet</div></td></tr>
            </tbody>
        </table>
    </div>
</div>
</div>
<th:block layout:fragment="page-scripts"><script>
var prf='all';
function prfilter(s,p){prf=s;document.querySelectorAll('.fp').forEach(x=>x.classList.remove('fa'));p.classList.add('fa');prdof();}
function prsearch(q){prdof(q);}
function prdof(q){q=(q!==undefined?q:document.getElementById('prSearch').value).toLowerCase();var rows=document.querySelectorAll('#prTable tbody tr.pr-row'),v=0;rows.forEach(r=>{var ok=(prf==='all'||r.dataset.s===prf)&&(!q||r.dataset.q.includes(q));r.style.display=ok?'':'none';if(ok)v++;});document.getElementById('prEmpty').style.display=v===0&&rows.length>0?'':'none';}
</script></th:block>
</body></html>
