<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In — UDJCS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --accent:       #e94560;
            --accent-light: #ff6b8a;
            --accent-glow:  rgba(233, 69, 96, 0.4);
            --glass-bg:     rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.11);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0d0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ─── Animated background ─── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 55%, rgba(15,52,96,0.65) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 15%, rgba(233,69,96,0.18) 0%, transparent 48%),
                radial-gradient(ellipse at 60% 85%, rgba(22,33,62,0.9) 0%, transparent 55%),
                linear-gradient(135deg, #0d0d1a 0%, #111827 45%, #0f3460 100%);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
            background-size: 52px 52px;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            animation: floatOrb ease-in-out infinite;
        }
        .orb-1 { width: 560px; height: 560px; top: -180px; right: -120px;
                  background: radial-gradient(circle, rgba(233,69,96,0.28), transparent 68%);
                  animation-duration: 22s; opacity: 0.55; }
        .orb-2 { width: 420px; height: 420px; bottom: -130px; left: -90px;
                  background: radial-gradient(circle, rgba(15,52,96,0.7), transparent 68%);
                  animation-duration: 28s; animation-delay: -9s; opacity: 0.6; }
        .orb-3 { width: 320px; height: 320px; top: 38%; left: 8%;
                  background: radial-gradient(circle, rgba(233,69,96,0.14), transparent 68%);
                  animation-duration: 19s; animation-delay: -5s; opacity: 0.45; }
        .orb-4 { width: 260px; height: 260px; bottom: 18%; right: 12%;
                  background: radial-gradient(circle, rgba(99,102,241,0.22), transparent 68%);
                  animation-duration: 24s; animation-delay: -13s; opacity: 0.4; }

        @keyframes floatOrb {
            0%,100% { transform: translate(0,0) scale(1); }
            25%      { transform: translate(28px,-38px) scale(1.04); }
            50%      { transform: translate(-18px,28px) scale(0.96); }
            75%      { transform: translate(36px,18px) scale(1.02); }
        }

        /* ─── Card wrapper entrance ─── */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 462px;
            padding: 20px;
            animation: slideUp 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(36px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* ─── Glassmorphism card ─── */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-radius: 22px;
            border: 1px solid var(--glass-border);
            box-shadow:
                0 0 0 1px rgba(233,69,96,0.08),
                0 24px 64px rgba(0,0,0,0.55),
                0 6px 20px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.09),
                inset 0 -1px 0 rgba(0,0,0,0.25);
            overflow: hidden;
        }

        /* Top glow bar */
        .glow-bar {
            height: 3px;
            background: linear-gradient(90deg,
                transparent 0%, var(--accent) 25%,
                var(--accent-light) 50%,
                var(--accent) 75%, transparent 100%);
            position: relative;
        }
        .glow-bar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: inherit;
            filter: blur(10px);
            opacity: 0.75;
        }

        /* ─── Header ─── */
        .login-header {
            padding: 34px 38px 26px;
            text-align: center;
            background: rgba(0,0,0,0.22);
            border-bottom: 1px solid rgba(255,255,255,0.055);
        }

        .logo-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 90px;
            border-radius: 22px;
            background: rgba(233,69,96,0.1);
            border: 1px solid rgba(233,69,96,0.22);
            box-shadow: 0 0 0 6px rgba(233,69,96,0.06), 0 10px 28px rgba(0,0,0,0.45);
            margin-bottom: 18px;
            animation: ringPulse 3.2s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%,100% { box-shadow: 0 0 0 6px rgba(233,69,96,0.06), 0 10px 28px rgba(0,0,0,0.45); }
            50%      { box-shadow: 0 0 0 10px rgba(233,69,96,0.12), 0 10px 28px rgba(0,0,0,0.45); }
        }

        .logo-ring img {
            width: 62px;
            height: 62px;
            object-fit: contain;
            border-radius: 12px;
        }

        .org-name {
            color: #fff;
            font-size: 1.08rem;
            font-weight: 700;
            margin: 0 0 5px;
            letter-spacing: 0.15px;
        }

        .org-sub {
            color: rgba(255,255,255,0.38);
            font-size: 0.7rem;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            margin: 0;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(233,69,96,0.1);
            border: 1px solid rgba(233,69,96,0.22);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.63rem;
            font-weight: 700;
            color: var(--accent-light);
            letter-spacing: 1.4px;
            text-transform: uppercase;
            margin-top: 16px;
        }

        /* ─── Form body ─── */
        .login-body { padding: 28px 38px 34px; }

        .field-label {
            display: block;
            color: rgba(255,255,255,0.5);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Input group */
        .ig {
            display: flex;
            border-radius: 11px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .ig:focus-within {
            border-color: rgba(233,69,96,0.55);
            box-shadow: 0 0 0 3px rgba(233,69,96,0.12);
        }

        .ig-icon {
            display: flex;
            align-items: center;
            padding: 0 14px;
            background: rgba(255,255,255,0.04);
            border-right: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.3);
            font-size: 1rem;
            flex-shrink: 0;
            transition: color 0.2s;
        }
        .ig:focus-within .ig-icon { color: var(--accent-light); }

        .ig input {
            flex: 1;
            min-width: 0;
            background: rgba(255,255,255,0.04);
            border: none;
            outline: none;
            color: #fff;
            font-size: 0.88rem;
            padding: 12px 14px;
            font-family: inherit;
        }
        .ig input::placeholder { color: rgba(255,255,255,0.18); }
        .ig input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 50px #1a2035 inset;
            -webkit-text-fill-color: #fff;
        }

        .ig-action {
            display: flex;
            align-items: center;
            padding: 0 14px;
            background: rgba(255,255,255,0.04);
            border: none;
            border-left: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.28);
            cursor: pointer;
            font-size: 0.95rem;
            transition: color 0.18s, background 0.18s;
            flex-shrink: 0;
        }
        .ig-action:hover { color: rgba(255,255,255,0.65); background: rgba(255,255,255,0.08); }

        /* Alert */
        .alert-glass {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(233,69,96,0.11);
            border: 1px solid rgba(233,69,96,0.28);
            border-radius: 11px;
            color: #ffb3bf;
            font-size: 0.82rem;
            padding: 12px 16px;
            margin-bottom: 22px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Divider */
        .form-sep {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.07);
            margin: 22px 0;
        }

        /* Sign-in button */
        .btn-signin {
            width: 100%;
            padding: 13px 20px;
            border: none;
            border-radius: 11px;
            background: linear-gradient(135deg, #e94560 0%, #c73552 60%, #a82844 100%);
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 22px rgba(233,69,96,0.38);
        }

        .btn-signin::after {
            content: '';
            position: absolute;
            top: 0; left: -120%;
            width: 80%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s ease;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(233,69,96,0.52);
        }
        .btn-signin:hover::after { left: 160%; }
        .btn-signin:active { transform: translateY(0); }

        /* ─── Footer ─── */
        .login-footer {
            text-align: center;
            margin-top: 22px;
        }

        .sec-note {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.2);
            font-size: 0.65rem;
            letter-spacing: 0.4px;
        }

        .copyright {
            color: rgba(255,255,255,0.12);
            font-size: 0.6rem;
            margin-top: 7px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<!-- Background layers -->
<div class="bg-canvas"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<!-- Login card -->
<div class="login-wrapper">
    <div class="login-card">

        <div class="glow-bar"></div>

        <!-- Header -->
        <div class="login-header">
            <div class="logo-ring">
                <img th:src="@{/images/logo.jpeg}" alt="UDJCS Logo">
            </div>
            <p class="org-name">United Digambar Jain Community</p>
            <p class="org-sub">Trust Management System</p>
            <div class="admin-badge">
                <i class="bi bi-shield-lock-fill"></i>
                Administrator Portal
            </div>
        </div>

        <!-- Form -->
        <div class="login-body">

            <div th:if="${error}" class="alert-glass">
                <i class="bi bi-exclamation-triangle-fill fs-6"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/login}" method="post" autocomplete="on" novalidate>

                <div class="mb-4">
                    <label class="field-label">Username</label>
                    <div class="ig">
                        <span class="ig-icon"><i class="bi bi-person-fill"></i></span>
                        <input type="text" name="username"
                               placeholder="Enter your username"
                               autocomplete="username" autofocus required>
                    </div>
                </div>

                <div class="mb-2">
                    <label class="field-label">Password</label>
                    <div class="ig">
                        <span class="ig-icon"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="password" id="pwdField"
                               placeholder="Enter your password"
                               autocomplete="current-password" required>
                        <button type="button" class="ig-action" id="pwdToggle"
                                aria-label="Toggle password visibility">
                            <i class="bi bi-eye" id="pwdIcon"></i>
                        </button>
                    </div>
                </div>

                <hr class="form-sep">

                <button type="submit" class="btn-signin">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In to Dashboard
                </button>

            </form>
        </div>
    </div>

    <div class="login-footer">
        <div class="sec-note">
            <i class="bi bi-shield-check"></i>
            Secured session &nbsp;·&nbsp; Authorized access only
        </div>
        <p class="copyright">&copy; 2025 United Digambar Jain Community &nbsp;·&nbsp; All rights reserved</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        const field = document.getElementById('pwdField');
        const icon  = document.getElementById('pwdIcon');
        document.getElementById('pwdToggle').addEventListener('click', function () {
            const show = field.type === 'password';
            field.type = show ? 'text' : 'password';
            icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
        });
    })();
</script>
</body>
</html>
