<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
<title>Invitations</title>
<style>
.reg-panel { background:#f8f7ff; }
.reg-inner { padding:16px 20px; }
.reg-table { font-size:0.82rem; }
.reg-table th { font-size:0.72rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:#64748b; border-bottom:2px solid #e0e7ff !important; }
.reg-table td { vertical-align:middle; border-color:#f1f0ff; }
.reg-summary { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:12px; }
.reg-stat { background:#fff; border:1px solid #e0e7ff; border-radius:8px; padding:8px 14px; font-size:0.78rem; }
.reg-stat strong { display:block; font-size:1rem; color:#4f46e5; }
.toggle-row { cursor:pointer; }
.toggle-row:hover { background:#faf9ff; }
.reg-badge { background:#4f46e5; color:#fff; border-radius:20px; padding:2px 10px; font-size:0.72rem; font-weight:700; cursor:pointer; border:none; transition:background 0.15s; }
.reg-badge:hover { background:#4338ca; }
.reg-badge.zero { background:#e2e8f0; color:#94a3b8; cursor:default; }
.chevron { transition:transform 0.2s; font-size:0.7rem; }
.collapsed .chevron { transform:rotate(-90deg); }
</style>
</head>
<body>

<th:block layout:fragment="page-title">Invitations</th:block>

<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Event Invitations</h5>
        <a th:href="@{/invitations/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Create Invitation
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead class="table-dark">
                    <tr>
                        <th style="width:44px;"></th>
                        <th>Event Title</th>
                        <th>Tag</th>
                        <th>Date</th>
                        <th>Registered</th>
                        <th>Public URL</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody th:each="item : ${items}">

                    <!-- ── Main row ── -->
                    <tr class="toggle-row"
                        th:attr="data-bs-toggle=${counts[item.id] > 0 ? 'collapse' : ''},
                                 data-bs-target=${counts[item.id] > 0 ? '#reg-' + item.id : ''}">
                        <td class="align-middle">
                            <div th:if="${item.bannerImage != null}"
                                 style="width:38px;height:38px;border-radius:6px;overflow:hidden;">
                                <img th:src="@{/invitations/{id}/banner(id=${item.id})}"
                                     style="width:100%;height:100%;object-fit:cover;">
                            </div>
                            <div th:unless="${item.bannerImage != null}"
                                 style="width:38px;height:38px;border-radius:6px;background:#e9ecef;
                                        display:flex;align-items:center;justify-content:center;">
                                <i class="bi bi-image text-muted" style="font-size:0.85rem;"></i>
                            </div>
                        </td>
                        <td class="align-middle">
                            <span class="fw-medium" th:text="${item.eventTitle}"></span>
                        </td>
                        <td class="align-middle">
                            <span th:if="${item.eventTag != null and !item.eventTag.isEmpty()}"
                                  class="badge rounded-pill"
                                  style="background:#eef2ff;color:#4f46e5;font-weight:600;font-size:0.72rem;"
                                  th:text="${item.eventTag}"></span>
                        </td>
                        <td class="align-middle text-muted small"
                            th:text="${item.eventDate != null ? #temporals.format(item.eventDate,'dd/MM/yyyy') : '—'}"></td>
                        <td class="align-middle">
                            <button th:class="${counts[item.id] > 0 ? 'reg-badge' : 'reg-badge zero'}"
                                    type="button">
                                <i class="bi bi-people me-1"></i>
                                <span th:text="${counts[item.id]}">0</span>
                                <i th:if="${counts[item.id] > 0}" class="bi bi-chevron-down chevron ms-1"></i>
                            </button>
                        </td>
                        <td class="align-middle" onclick="event.stopPropagation()">
                            <div class="d-flex align-items-center gap-1">
                                <a th:href="@{/e/{slug}(slug=${item.slug})}" target="_blank"
                                   class="text-decoration-none small"
                                   style="color:#4f46e5;font-family:monospace;">
                                    <i class="bi bi-box-arrow-up-right me-1" style="font-size:0.7rem;"></i>
                                    <span th:text="'/e/' + ${item.slug}"></span>
                                </a>
                                <button type="button"
                                        class="btn btn-sm py-0 px-1 ms-1"
                                        style="border:none;background:none;color:#94a3b8;"
                                        th:attr="data-url=${baseUrl + '/e/' + item.slug}"
                                        onclick="copyInvUrl(this)"
                                        title="Copy full URL">
                                    <i class="bi bi-clipboard" style="font-size:0.8rem;"></i>
                                </button>
                            </div>
                        </td>
                        <td class="align-middle text-end" onclick="event.stopPropagation()">
                            <a th:href="@{/invitations/{id}/edit(id=${item.id})}"
                               class="btn btn-sm btn-outline-warning me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/invitations/{id}/export(id=${item.id})}"
                               class="btn btn-sm btn-outline-primary me-1"
                               title="Download standalone HTML">
                                <i class="bi bi-download"></i>
                            </a>
                            <form th:action="@{/invitations/{id}/delete(id=${item.id})}" method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('Delete this invitation and all registrations?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>

                    <!-- ── Inline registrations panel ── -->
                    <tr th:if="${counts[item.id] > 0}" class="reg-panel">
                        <td colspan="7" class="p-0">
                            <div class="collapse" th:id="'reg-' + ${item.id}">
                                <div class="reg-inner">

                                    <!-- Summary stats -->
                                    <div class="reg-summary">
                                        <div class="reg-stat">
                                            <strong th:text="${counts[item.id]}">0</strong>Registrations
                                        </div>
                                        <div class="reg-stat">
                                            <strong th:text="'£' + ${#aggregates.sum(regMap[item.id].![totalAmount != null ? totalAmount : 0])}">£0</strong>Total Collected
                                        </div>
                                        <div class="reg-stat">
                                            <strong th:text="${#aggregates.sum(regMap[item.id].![attendeesAdult != null ? attendeesAdult : 0]) + #aggregates.sum(regMap[item.id].![attendeesYouth != null ? attendeesYouth : 0]) + #aggregates.sum(regMap[item.id].![attendeesUnder8 != null ? attendeesUnder8 : 0])}">0</strong>Total Attendees
                                        </div>
                                        <div class="reg-stat">
                                            <strong th:text="'£' + ${#aggregates.sum(regMap[item.id].![donationAmount != null ? donationAmount : 0])}">£0</strong>Donations
                                        </div>
                                    </div>

                                    <!-- Registrations table -->
                                    <table class="table table-sm reg-table mb-0">
                                        <thead>
                                            <tr>
                                                <th>#</th>
                                                <th>Name</th>
                                                <th>Age / Sex</th>
                                                <th>Contact</th>
                                                <th class="text-center">Adult</th>
                                                <th class="text-center">Youth</th>
                                                <th class="text-center">Under 8</th>
                                                <th class="text-end">Donation</th>
                                                <th class="text-end">Total</th>
                                                <th>Registered</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="r, s : ${regMap[item.id]}">
                                                <td class="text-muted" th:text="${s.count}"></td>
                                                <td class="fw-medium" th:text="${r.firstName + ' ' + r.lastName}"></td>
                                                <td class="text-muted" th:text="${(r.age != null ? r.age : '—') + ' / ' + (r.sex != null ? r.sex : '—')}"></td>
                                                <td>
                                                    <div th:text="${r.phone}"></div>
                                                    <div class="text-muted" style="font-size:0.75rem;" th:text="${r.email}"></div>
                                                </td>
                                                <td class="text-center" th:text="${r.attendeesAdult ?: 0}"></td>
                                                <td class="text-center" th:text="${r.attendeesYouth ?: 0}"></td>
                                                <td class="text-center" th:text="${r.attendeesUnder8 ?: 0}"></td>
                                                <td class="text-end text-muted"
                                                    th:text="${r.donationAmount != null ? '£' + #numbers.formatDecimal(r.donationAmount,1,2) : '—'}"></td>
                                                <td class="text-end fw-semibold"
                                                    th:text="${r.totalAmount != null ? '£' + #numbers.formatDecimal(r.totalAmount,1,2) : '£0.00'}"
                                                    style="color:#4f46e5;"></td>
                                                <td class="text-muted" style="font-size:0.75rem;"
                                                    th:text="${#temporals.format(r.createdAt,'dd MMM HH:mm')}"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </td>
                    </tr>

                </tbody>

                <tbody th:if="${#lists.isEmpty(items)}">
                    <tr>
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-envelope-paper d-block mb-2" style="font-size:2rem;opacity:0.3;"></i>
                            No invitations yet. Create one to get a shareable public URL.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<th:block layout:fragment="page-scripts">
<script>
function copyInvUrl(btn) {
    var url = btn.getAttribute('data-url');
    navigator.clipboard.writeText(url).then(function() {
        btn.innerHTML = '<i class="bi bi-check-lg" style="font-size:0.8rem;color:#059669;"></i>';
        setTimeout(function() { btn.innerHTML = '<i class="bi bi-clipboard" style="font-size:0.8rem;"></i>'; }, 2000);
    });
}
// Rotate chevron when panel opens/closes
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('[data-bs-toggle="collapse"]').forEach(function(row) {
        var target = document.querySelector(row.getAttribute('data-bs-target'));
        if (!target) return;
        target.addEventListener('show.bs.collapse', function() {
            row.querySelector('.chevron') && row.querySelector('.chevron').classList.remove('collapsed');
        });
        target.addEventListener('hide.bs.collapse', function() {
            row.querySelector('.chevron') && row.querySelector('.chevron').classList.add('collapsed');
        });
    });
});
</script>
</th:block>

</body>
</html>
