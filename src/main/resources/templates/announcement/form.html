<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Announcement</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'New Announcement' : 'Edit Announcement'}">Announcement</th:block>

<div layout:fragment="content">
    <div class="card shadow-sm border-0" style="max-width:660px;">
        <div class="card-header bg-white border-bottom fw-semibold"
             th:text="${item.id == null ? 'Add New Announcement' : 'Edit Announcement'}"></div>
        <div class="card-body">
            <form th:action="${item.id == null ? '/announcements' : '/announcements/' + item.id}"
                  th:object="${item}" method="post">

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label fw-medium">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{title}"
                               th:classappend="${#fields.hasErrors('title')} ? ' is-invalid'"
                               placeholder="Short, clear headline">
                        <div class="invalid-feedback" th:errors="*{title}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Message <span class="text-danger">*</span></label>
                        <textarea class="form-control" th:field="*{message}" rows="4"
                                  th:classappend="${#fields.hasErrors('message')} ? ' is-invalid'"
                                  placeholder="Full announcement text..."></textarea>
                        <div class="invalid-feedback" th:errors="*{message}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Type <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{type}"
                                th:classappend="${#fields.hasErrors('type')} ? ' is-invalid'">
                            <option value="">-- Select --</option>
                            <option value="General">General</option>
                            <option value="Urgent">Urgent</option>
                            <option value="Event">Event</option>
                            <option value="Notice">Notice</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{type}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Published Date <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{publishedDate}"
                               th:classappend="${#fields.hasErrors('publishedDate')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{publishedDate}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Expiry Date</label>
                        <input type="date" class="form-control" th:field="*{expiryDate}"
                               th:classappend="${#fields.hasErrors('expiryDate')} ? ' is-invalid'">
                        <div class="form-text">Leave blank for no expiry.</div>
                    </div>

                    <div class="col-12">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeCheck">
                            <label class="form-check-label fw-medium" for="activeCheck">Active (visible to members)</label>
                        </div>
                    </div>

                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <a th:href="@{/announcements}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
