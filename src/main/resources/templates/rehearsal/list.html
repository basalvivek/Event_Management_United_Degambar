<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Rehearsal Schedule</title></head>
<body>

<th:block layout:fragment="page-title">Rehearsal Schedule</th:block>

<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Rehearsal Schedule</h5>
        <a th:href="@{/rehearsals/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Add Rehearsal
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${groups == null or groups.isEmpty()}" class="card border-0 shadow-sm">
        <div class="card-body text-center text-muted py-5">
            <i class="bi bi-clock-history d-block mb-2" style="font-size:2rem;opacity:0.3;"></i>
            No rehearsals found.
        </div>
    </div>

    <!-- Activity groups -->
    <div class="card shadow-sm border-0" th:unless="${groups == null or groups.isEmpty()}">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-3" style="width:36px;">#</th>
                        <th>Activity</th>
                        <th>Category</th>
                        <th>Next Rehearsal</th>
                        <th class="text-center">Sessions</th>
                        <th class="text-end pe-3">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:each="entry, stat : ${groups}">

                        <!-- Activity summary row -->
                        <tr th:with="rehearsals=${entry.value},
                                     activity=${entry.value[0].activity}">
                            <td class="ps-3 text-muted align-middle" th:text="${stat.count}"></td>
                            <td class="fw-semibold align-middle" th:text="${activity.activityName}"></td>
                            <td class="align-middle">
                                <span class="badge bg-primary bg-opacity-75"
                                      th:text="${activity.activityCategory.categoryName}"></span>
                            </td>
                            <td class="align-middle">
                                <span th:if="${nextRehearsal[entry.key] != null}"
                                      th:text="${#temporals.format(nextRehearsal[entry.key].rehearsalDate, 'dd-MMM-yyyy')}"
                                      class="fw-medium text-primary"></span>
                                <span th:unless="${nextRehearsal[entry.key] != null}"
                                      class="text-muted" style="font-size:0.82rem;">No upcoming</span>
                            </td>
                            <td class="text-center align-middle">
                                <span class="badge rounded-pill"
                                      style="background:rgba(139,92,246,0.12);color:#6d28d9;font-size:0.8rem;padding:5px 12px;">
                                    <i class="bi bi-clock-history me-1"></i>
                                    <span th:text="${#lists.size(rehearsals)}">0</span>
                                </span>
                            </td>
                            <td class="text-end pe-3 align-middle">
                                <button class="btn btn-sm btn-outline-secondary"
                                        type="button"
                                        data-bs-toggle="collapse"
                                        th:attr="data-bs-target='#rehearsals-' + ${entry.key}"
                                        aria-expanded="false">
                                    <i class="bi bi-chevron-down me-1" style="font-size:0.75rem;"></i>View Sessions
                                </button>
                            </td>
                        </tr>

                        <!-- Collapsible rehearsal detail rows -->
                        <tr>
                            <td colspan="6" class="p-0 border-0">
                                <div class="collapse" th:id="'rehearsals-' + ${entry.key}">
                                    <div class="px-4 py-3" style="background:#faf5ff;border-top:1px solid #e9d5ff;">
                                        <table class="table table-sm mb-0" style="font-size:0.84rem;">
                                            <thead>
                                                <tr style="background:#ede9fe;">
                                                    <th class="ps-2 text-muted fw-semibold" style="font-size:0.75rem;">Date</th>
                                                    <th class="text-muted fw-semibold" style="font-size:0.75rem;">Time</th>
                                                    <th class="text-muted fw-semibold" style="font-size:0.75rem;">Venue</th>
                                                    <th class="text-muted fw-semibold" style="font-size:0.75rem;">Conducted By</th>
                                                    <th class="text-muted fw-semibold text-center" style="font-size:0.75rem;">Members</th>
                                                    <th class="text-muted fw-semibold" style="font-size:0.75rem;">Status</th>
                                                    <th class="text-end pe-2 text-muted fw-semibold" style="font-size:0.75rem;">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="r : ${entry.value}">
                                                    <td class="ps-2 align-middle fw-medium"
                                                        th:text="${#temporals.format(r.rehearsalDate,'dd-MMM-yyyy')}"></td>
                                                    <td class="align-middle text-muted">
                                                        <span th:if="${r.startTime != null}" th:text="${r.startTime}"></span>
                                                        <span th:if="${r.startTime != null and r.endTime != null}"> – </span>
                                                        <span th:if="${r.endTime != null}" th:text="${r.endTime}"></span>
                                                        <span th:if="${r.startTime == null and r.endTime == null}">—</span>
                                                    </td>
                                                    <td class="align-middle text-muted"
                                                        th:text="${r.venue != null ? r.venue : '—'}"></td>
                                                    <td class="align-middle text-muted"
                                                        th:text="${r.conductedBy != null ? r.conductedBy : '—'}"></td>
                                                    <td class="align-middle text-center">
                                                        <span th:if="${memberCounts[r.id] != null and memberCounts[r.id] > 0}"
                                                              class="badge rounded-pill"
                                                              style="background:rgba(16,185,129,0.12);color:#065f46;font-size:0.72rem;">
                                                            <i class="bi bi-person-check me-1"></i>
                                                            <span th:text="${attendedCounts[r.id] != null ? attendedCounts[r.id] : 0}">0</span>
                                                            /
                                                            <span th:text="${memberCounts[r.id]}">0</span>
                                                        </span>
                                                        <span th:unless="${memberCounts[r.id] != null and memberCounts[r.id] > 0}"
                                                              class="text-muted" style="font-size:0.78rem;">—</span>
                                                    </td>
                                                    <td class="align-middle">
                                                        <span th:with="sc=${r.status == 'Completed'} ? 'bg-success' : (${r.status == 'Cancelled'} ? 'bg-danger' : (${r.status == 'Postponed'} ? 'bg-warning text-dark' : 'bg-primary'))"
                                                              th:class="'badge ' + ${sc}"
                                                              th:text="${r.status}"></span>
                                                    </td>
                                                    <td class="text-end pe-2 align-middle">
                                                        <a th:href="@{/rehearsals/{id}/attendance(id=${r.id})}"
                                                           class="btn btn-sm btn-success py-0 px-2 me-1">
                                                            <i class="bi bi-person-check-fill me-1"></i>Attendance
                                                        </a>
                                                        <a th:href="@{/rehearsals/{id}/edit(id=${r.id})}"
                                                           class="btn btn-sm btn-primary py-0 px-2 me-1">
                                                            <i class="bi bi-person-plus-fill me-1"></i>Add Member
                                                        </a>
                                                        <a th:href="@{/rehearsals/{id}/edit(id=${r.id})}"
                                                           class="btn btn-sm btn-outline-warning py-0 px-2">
                                                            <i class="bi bi-pencil"></i>
                                                        </a>
                                                        <form th:action="@{/rehearsals/{id}/delete(id=${r.id})}"
                                                              method="post" class="d-inline"
                                                              data-confirm='Delete this rehearsal?'>
                                                            <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-2">
                                                                <i class="bi bi-trash"></i>
                                                            </button>
                                                        </form>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </td>
                        </tr>

                    </th:block>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
