<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add / Edit Rehearsal</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'Add' : 'Edit'} + ' Rehearsal'">Rehearsal</th:block>

<div layout:fragment="content">
    <div class="card shadow-sm border-0" style="max-width:680px;">
        <div class="card-header bg-white border-bottom fw-semibold"
             th:text="${item.id == null ? 'Add New Rehearsal' : 'Edit Rehearsal'}"></div>
        <div class="card-body">
            <form th:action="${item.id == null ? '/rehearsals' : '/rehearsals/' + item.id}"
                  th:object="${item}" method="post">

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label fw-medium">Activity <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{activityId}"
                                th:classappend="${#fields.hasErrors('activityId')} ? ' is-invalid'">
                            <option value="">-- Select Activity --</option>
                            <option th:each="a : ${activities}"
                                    th:value="${a.id}"
                                    th:text="${a.activityName} + ' [' + ${a.activityCategory.categoryName} + ']'"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{activityId}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Rehearsal Date <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{rehearsalDate}"
                               th:classappend="${#fields.hasErrors('rehearsalDate')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{rehearsalDate}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}"
                                th:classappend="${#fields.hasErrors('status')} ? ' is-invalid'">
                            <option value="">-- Select Status --</option>
                            <option value="Scheduled">Scheduled</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                            <option value="Postponed">Postponed</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Start Time</label>
                        <input type="time" class="form-control" th:field="*{startTime}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">End Time</label>
                        <input type="time" class="form-control" th:field="*{endTime}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Venue</label>
                        <input type="text" class="form-control" th:field="*{venue}"
                               th:classappend="${#fields.hasErrors('venue')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{venue}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Conducted By <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{conductedBy}"
                               th:classappend="${#fields.hasErrors('conductedBy')} ? ' is-invalid'"
                               placeholder="Enter name" required>
                        <div class="invalid-feedback" th:errors="*{conductedBy}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Notes</label>
                        <textarea class="form-control" th:field="*{notes}" rows="2"
                                  th:classappend="${#fields.hasErrors('notes')} ? ' is-invalid'"></textarea>
                        <div class="invalid-feedback" th:errors="*{notes}"></div>
                    </div>

                    <!-- ── Members & Roles ── -->
                    <div class="col-12">
                        <div class="p-3 rounded-3" style="background:#f8faff;border:1px solid #e0e7ff;">
                            <div class="d-flex align-items-center justify-content-between mb-3">
                                <div>
                                    <span class="fw-semibold" style="font-size:0.9rem;color:#1e1b4b;">
                                        <i class="bi bi-people-fill text-primary me-2"></i>Members &amp; Roles
                                    </span>
                                    <div class="text-muted" style="font-size:0.75rem;">Add members attending this rehearsal.</div>
                                </div>
                                <button type="button" class="btn btn-primary btn-sm px-3" onclick="addMemberRow()">
                                    <i class="bi bi-person-plus-fill me-1"></i>Add Member
                                </button>
                            </div>
                            <div id="memberRows" class="d-flex flex-column gap-2"></div>
                        </div>

                        <!-- Hidden member options for JS -->
                        <select id="memberSrc" style="display:none;">
                            <option value="">-- Select Member --</option>
                            <option th:each="m : ${members}"
                                    th:value="${m.id}"
                                    th:text="${m.firstName + ' ' + m.lastName + ' — ' + m.phone}"></option>
                        </select>

                        <!-- Existing members for edit (passed as JSON-like hidden inputs) -->
                        <th:block th:if="${existingMembers != null and not #lists.isEmpty(existingMembers)}">
                            <input type="hidden" id="existingCount" th:value="${#lists.size(existingMembers)}">
                            <span th:each="em, s : ${existingMembers}"
                                  th:attr="data-em-member=${em.memberId},data-em-role=${em.role},data-em-idx=${s.index}"
                                  class="d-none existing-member-data"></span>
                        </th:block>
                    </div>

                </div>

                <div th:if="${duplicateError}"
                     class="mt-3 d-flex align-items-start gap-2 p-2 rounded-2"
                     style="background:#fef2f2;border:1px solid #fecaca;font-size:0.82rem;color:#dc2626;">
                    <i class="bi bi-calendar-x-fill flex-shrink-0 mt-1"></i>
                    <span th:text="${duplicateError}"></span>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <a th:href="@{/rehearsals}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>
<th:block layout:fragment="page-scripts">
<script>
(function () {
    var roles = ['Participant','Lead','Co-Lead','Coordinator','Observer','Support'];

    function buildRoleOptions(selected) {
        return roles.map(function(r) {
            return '<option value="' + r + '"' + (r === selected ? ' selected' : '') + '>' + r + '</option>';
        }).join('');
    }

    window.addMemberRow = function (preselectedMemberId, preselectedRole) {
        var src = document.getElementById('memberSrc');
        var container = document.getElementById('memberRows');
        if (!src || !container) return;
        var rowNum = container.children.length + 1;

        var options = src.innerHTML;
        if (preselectedMemberId) {
            options = options.replace(
                'value="' + preselectedMemberId + '"',
                'value="' + preselectedMemberId + '" selected'
            );
        }

        var div = document.createElement('div');
        div.className = 'd-flex align-items-center gap-2 p-2 rounded-2';
        div.style.background = '#fff';
        div.style.border = '1px solid #e5e7eb';
        div.innerHTML =
            '<span class="badge rounded-pill bg-primary bg-opacity-75 flex-shrink-0" style="min-width:26px;text-align:center;">' + rowNum + '</span>' +
            '<select name="memberIds" class="form-select form-select-sm flex-grow-1">' + options + '</select>' +
            '<select name="memberRoles" class="form-select form-select-sm" style="max-width:160px;">' +
              buildRoleOptions(preselectedRole || 'Participant') +
            '</select>' +
            '<button type="button" class="btn btn-sm btn-outline-danger px-2 flex-shrink-0" onclick="removeRow(this)">' +
              '<i class="bi bi-x-lg"></i>' +
            '</button>';
        container.appendChild(div);
    };

    window.removeRow = function (btn) {
        btn.closest('div[style]').remove();
        document.querySelectorAll('#memberRows > div').forEach(function(d, i) {
            d.querySelector('.badge').textContent = i + 1;
        });
    };

    // Pre-populate existing members on edit
    document.addEventListener('DOMContentLoaded', function () {
        var existing = document.querySelectorAll('.existing-member-data');
        if (existing.length > 0) {
            existing.forEach(function(el) {
                addMemberRow(el.getAttribute('data-em-member'), el.getAttribute('data-em-role'));
            });
        }
    });
})();
</script>
</th:block>
</body>
</html>
