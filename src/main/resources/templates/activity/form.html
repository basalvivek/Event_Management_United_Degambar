<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add / Edit Activity</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'Add' : 'Edit'} + ' Activity'">Activity</th:block>

<div layout:fragment="content">
    <div class="card shadow-sm border-0" style="max-width:720px;">
        <div class="card-header bg-white border-bottom fw-semibold"
             th:text="${item.id == null ? 'Add New Activity' : 'Edit Activity'}"></div>
        <div class="card-body">
            <form th:action="${item.id == null ? '/activities' : '/activities/' + item.id}"
                  th:object="${item}" method="post">

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label fw-medium">Activity Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{activityName}"
                               th:classappend="${#fields.hasErrors('activityName')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{activityName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Category <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{categoryId}"
                                th:classappend="${#fields.hasErrors('categoryId')} ? ' is-invalid'">
                            <option value="">-- Select Category --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.categoryName}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{categoryId}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}"
                                th:classappend="${#fields.hasErrors('status')} ? ' is-invalid'">
                            <option value="">-- Select Status --</option>
                            <option value="Planned">Planned</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Start Date</label>
                        <input type="date" class="form-control" th:field="*{startDate}"
                               th:classappend="${#fields.hasErrors('startDate')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{startDate}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">End Date</label>
                        <input type="date" class="form-control" th:field="*{endDate}"
                               th:classappend="${#fields.hasErrors('endDate')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{endDate}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Responsible Person
                            <span class="text-muted fw-normal" style="font-size:0.78rem;">(optional)</span>
                        </label>
                        <select class="form-select" th:field="*{responsiblePerson}">
                            <option value="">-- Select Member --</option>
                            <option th:each="m : ${members}"
                                    th:value="${m.firstName + ' ' + m.lastName}"
                                    th:text="${m.firstName + ' ' + m.lastName}"></option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Description</label>
                        <textarea class="form-control" th:field="*{description}" rows="2"
                                  th:classappend="${#fields.hasErrors('description')} ? ' is-invalid'"></textarea>
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Notes</label>
                        <textarea class="form-control" th:field="*{notes}" rows="2"
                                  th:classappend="${#fields.hasErrors('notes')} ? ' is-invalid'"></textarea>
                        <div class="invalid-feedback" th:errors="*{notes}"></div>
                    </div>

                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <a th:href="@{/activities}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
