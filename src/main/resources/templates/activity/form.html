<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add / Edit Activity</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'Add' : 'Edit'} + ' Activity'">Activity</th:block>

<div layout:fragment="content">
    <div class="card shadow-sm border-0" style="max-width:720px;">
        <div class="card-header bg-white border-bottom fw-semibold"
             th:text="${item.id == null ? 'Add New Activity' : 'Edit Activity'}"></div>
        <div class="card-body">
            <form th:action="${item.id == null ? '/activities' : '/activities/' + item.id}"
                  th:object="${item}" method="post">

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label fw-medium">Activity Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{activityName}"
                               th:classappend="${#fields.hasErrors('activityName')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{activityName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Category <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{categoryId}"
                                th:classappend="${#fields.hasErrors('categoryId')} ? ' is-invalid'">
                            <option value="">-- Select Category --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.categoryName}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{categoryId}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}"
                                th:classappend="${#fields.hasErrors('status')} ? ' is-invalid'">
                            <option value="">-- Select Status --</option>
                            <option value="Planned">Planned</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Start Date</label>
                        <input type="date" class="form-control" th:field="*{startDate}"
                               th:classappend="${#fields.hasErrors('startDate')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{startDate}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">End Date</label>
                        <input type="date" class="form-control" th:field="*{endDate}"
                               th:classappend="${#fields.hasErrors('endDate')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{endDate}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Responsible Person
                            <span class="text-muted fw-normal" style="font-size:0.78rem;">(optional)</span>
                        </label>
                        <select class="form-select" th:field="*{responsiblePerson}">
                            <option value="">-- Select Member --</option>
                            <option th:each="m : ${members}"
                                    th:value="${m.firstName + ' ' + m.lastName}"
                                    th:text="${m.firstName + ' ' + m.lastName}"></option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Description</label>
                        <textarea class="form-control" th:field="*{description}" rows="2"
                                  th:classappend="${#fields.hasErrors('description')} ? ' is-invalid'"></textarea>
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Notes</label>
                        <textarea class="form-control" th:field="*{notes}" rows="2"
                                  th:classappend="${#fields.hasErrors('notes')} ? ' is-invalid'"></textarea>
                        <div class="invalid-feedback" th:errors="*{notes}"></div>
                    </div>

                    <div class="col-12">
                        <div class="p-3 rounded-3 d-flex align-items-center justify-content-between"
                             style="background:#f0fdf4;border:1px solid #bbf7d0;">
                            <div>
                                <div class="fw-semibold" style="font-size:0.88rem;color:#166534;">
                                    <i class="bi bi-eye me-2 text-success"></i>Show on Member Portal
                                </div>
                                <div class="text-muted" style="font-size:0.76rem;">
                                    When enabled, this activity appears on the member portal homepage.
                                    Only shows if end date is today or in the future.
                                </div>
                            </div>
                            <div class="form-check form-switch ms-3 mb-0">
                                <input class="form-check-input" type="checkbox" role="switch"
                                       th:field="*{showOnPortal}"
                                       style="width:2.8em;height:1.5em;cursor:pointer;">
                            </div>
                        </div>
                    </div>

                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <a th:href="@{/activities}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>

            <!-- ── Manage Categories ── -->
            <div class="mt-4 pt-4" style="border-top:1px dashed #dee2e6;">
                <div class="d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-tags-fill text-primary"></i>
                    <span class="fw-semibold" style="font-size:0.9rem;">Manage Categories</span>
                </div>

                <!-- Existing categories as tags -->
                <div class="d-flex flex-wrap gap-2 mb-3">
                    <span th:each="cat : ${categories}"
                          class="d-inline-flex align-items-center gap-1 px-3 py-1 rounded-pill"
                          style="background:#ede9fe;color:#5b21b6;font-size:0.8rem;font-weight:500;">
                        <i class="bi bi-tag" style="font-size:0.72rem;"></i>
                        <span th:text="${cat.categoryName}"></span>
                        <form th:action="@{/activity-categories/{id}/delete(id=${cat.id})}"
                              method="post" class="d-inline m-0"
                              data-confirm='Delete category?'>
                            <input type="hidden" name="returnTo"
                                   th:value="${item.id == null ? '/activities/new' : '/activities/' + item.id + '/edit'}">
                            <button type="submit"
                                    style="background:none;border:none;padding:0 0 0 4px;cursor:pointer;
                                           color:#7c3aed;line-height:1;vertical-align:middle;">
                                <i class="bi bi-x-circle-fill" style="font-size:0.78rem;"></i>
                            </button>
                        </form>
                    </span>
                    <span th:if="${#lists.isEmpty(categories)}"
                          class="text-muted" style="font-size:0.82rem;">No categories yet. Add one below.</span>
                </div>

                <!-- Add new category inline -->
                <form th:action="@{/activity-categories/quick-add}" method="post"
                      class="d-flex align-items-center gap-2">
                    <input type="hidden" name="returnTo"
                           th:value="${item.id == null ? '/activities/new' : '/activities/' + item.id + '/edit'}">
                    <input type="text" name="categoryName" class="form-control form-control-sm"
                           placeholder="New category name..." style="max-width:240px;" required>
                    <button type="submit" class="btn btn-sm btn-outline-primary px-3">
                        <i class="bi bi-plus-lg me-1"></i>Add
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
