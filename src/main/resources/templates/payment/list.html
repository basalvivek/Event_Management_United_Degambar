<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Organisation Donation</title></head>
<body>
<th:block layout:fragment="page-title">Organisation Donation</th:block>
<div layout:fragment="content">
<style>
.pd-table th{font-size:.7rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#6366f1;padding:11px 14px;background:#f8f7ff;border-bottom:2px solid #e0e7ff;}
.pd-table td{padding:12px 14px;vertical-align:middle;border-color:#f1f5f9;font-size:.84rem;}
.pd-row{transition:background .1s;}
.pd-row:hover{background:#fafafe;}
.pd-row.s-Done{border-left:3px solid #059669;}
.pd-row.s-Pending{border-left:3px solid #f59e0b;}
.pd-row.s-Partial{border-left:3px solid #6366f1;}
.donor-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 9px;font-size:.68rem;font-weight:700;}
.donor-org{background:#eef2ff;color:#4f46e5;}
.donor-member{background:#f0fdf4;color:#166534;}
.mode-chip{background:#f1f5f9;border-radius:6px;padding:2px 8px;font-size:.72rem;font-weight:600;color:#475569;}
.status-tag{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 12px;font-size:.72rem;font-weight:700;}
.st-Done{background:#dcfce7;color:#166534;}
.st-Pending{background:#fef3c7;color:#92400e;}
.st-Partial{background:#ede9fe;color:#5b21b6;}
.st-Received{background:#dcfce7;color:#166534;}
.amt{font-family:monospace;font-weight:700;font-size:.88rem;color:#1e1b4b;}
.fp{border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:600;border:1.5px solid #e5e7eb;background:#fff;color:#475569;cursor:pointer;transition:all .15s;}
.fp:hover{border-color:#6366f1;color:#6366f1;}
.fp.fa{background:#1e1b4b;border-color:#1e1b4b;color:#fff;}
.fp.fp-done.fa{background:#059669;border-color:#059669;}
.fp.fp-pending.fa{background:#d97706;border-color:#d97706;}
.sw{position:relative;}.sw i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.8rem;}
.sb{border-radius:20px;border:1.5px solid #e5e7eb;padding:6px 14px 6px 32px;font-size:.84rem;width:220px;}
.sb:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1);outline:none;}
</style>
<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
    <div>
        <h5 class="fw-bold mb-0" style="color:#1e1b4b;">Organisation Donation</h5>
        <p class="text-muted mb-0" style="font-size:.78rem;">Track donations from organisations and members</p>
    </div>
    <a th:href="@{/payments/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Donation</a>
</div>
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div class="d-flex gap-2 flex-wrap">
        <span class="fp fa" onclick="fpay('all',this)">All <span class="ms-1 badge rounded-pill text-bg-dark" style="font-size:.65rem;" th:text="${#lists.size(items)}"></span></span>
        <span class="fp fp-done"    onclick="fpay('Done',this)"><i class="bi bi-circle-fill me-1" style="font-size:.45rem;color:#059669;"></i>Done</span>
        <span class="fp fp-pending" onclick="fpay('Pending',this)"><i class="bi bi-circle-fill me-1" style="font-size:.45rem;color:#d97706;"></i>Pending</span>
    </div>
    <div class="sw"><i class="bi bi-search"></i><input type="text" class="sb form-control" id="pdSearch" placeholder="Search donor…" oninput="pdsearch(this.value)"></div>
</div>
<div class="card border-0 shadow-sm" style="border-radius:14px;overflow:hidden;">
    <div class="table-responsive">
        <table class="table pd-table mb-0" id="pdTable">
            <thead><tr>
                <th style="width:36px;">#</th>
                <th>Donor</th>
                <th class="text-end">Amount</th>
                <th>Date</th>
                <th>Mode</th>
                <th>Reference</th>
                <th>Status</th>
                <th class="text-end" style="padding-right:16px;">Actions</th>
            </tr></thead>
            <tbody>
                <tr th:each="item,stat : ${items}" th:class="'pd-row s-' + ${item.status}"
                    th:attr="data-s=${item.status}, data-q=${((item.supportiveOrganization != null ? item.supportiveOrganization.name : '') + ' ' + (item.member != null ? item.member.firstName + ' ' + item.member.lastName : '')).toLowerCase()}">
                    <td class="text-muted fw-medium" th:text="${stat.count}"></td>
                    <td>
                        <div th:if="${item.supportiveOrganization != null}" class="d-flex align-items-center gap-2">
                            <span class="donor-badge donor-org">Org</span>
                            <span class="fw-semibold" style="font-size:.86rem;" th:text="${item.supportiveOrganization.name}"></span>
                        </div>
                        <div th:if="${item.member != null}" class="d-flex align-items-center gap-2">
                            <span class="donor-badge donor-member">Member</span>
                            <span class="fw-semibold" style="font-size:.86rem;" th:text="${item.member.firstName + ' ' + item.member.lastName}"></span>
                        </div>
                        <span th:if="${item.supportiveOrganization == null and item.member == null}" class="text-muted">—</span>
                    </td>
                    <td class="text-end"><span class="amt" th:text="${item.amount != null ? '£' + #numbers.formatDecimal(item.amount,1,2) : '—'}"></span></td>
                    <td>
                        <div th:if="${item.paymentDate != null}">
                            <i class="bi bi-calendar3 me-1" style="font-size:.72rem;color:#94a3b8;"></i>
                            <span th:text="${#temporals.format(item.paymentDate,'dd MMM yyyy')}"></span>
                        </div>
                        <span th:unless="${item.paymentDate != null}" class="text-muted">—</span>
                    </td>
                    <td><span class="mode-chip" th:text="${item.paymentMode}"></span></td>
                    <td style="font-size:.78rem;color:#64748b;" th:text="${item.referenceNumber != null ? item.referenceNumber : '—'}"></td>
                    <td>
                        <span th:class="'status-tag st-' + ${item.status}" th:text="${item.status}"></span>
                    </td>
                    <td class="text-end" style="padding-right:16px;white-space:nowrap;">
                        <a th:href="@{/payments/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-warning me-1"><i class="bi bi-pencil-fill"></i></a>
                        <form th:action="@{/payments/{id}/delete(id=${item.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this payment?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash-fill"></i></button>
                        </form>
                    </td>
                </tr>
                <tr id="pdEmpty" style="display:none;"><td colspan="8" class="text-center py-5 text-muted"><i class="bi bi-inbox d-block mb-1" style="font-size:2rem;opacity:.3;"></i>No records match</td></tr>
                <tr th:if="${#lists.isEmpty(items)}"><td colspan="8" class="text-center py-5 text-muted"><i class="bi bi-cash-stack d-block mb-2" style="font-size:2.5rem;color:#c7d2fe;"></i><div class="fw-semibold">No donation records yet</div></td></tr>
            </tbody>
        </table>
    </div>
</div>
</div>
<th:block layout:fragment="page-scripts"><script>
var pf='all';
function fpay(s,pill){pf=s;document.querySelectorAll('.fp').forEach(p=>p.classList.remove('fa'));pill.classList.add('fa');pdfilter();}
function pdsearch(q){pdfilter(q);}
function pdfilter(q){q=(q!==undefined?q:document.getElementById('pdSearch').value).toLowerCase();var rows=document.querySelectorAll('#pdTable tbody tr.pd-row'),v=0;rows.forEach(r=>{var ok=(pf==='all'||r.dataset.s===pf)&&(!q||r.dataset.q.includes(q));r.style.display=ok?'':'none';if(ok)v++;});document.getElementById('pdEmpty').style.display=v===0&&rows.length>0?'':'none';}
</script></th:block>
</body></html>
