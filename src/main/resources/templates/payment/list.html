<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Participation Payment</title></head>
<body>

<th:block layout:fragment="page-title">Participation Payment</th:block>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Participation Payment</h5>
        <a th:href="@{/payments/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Add New
        </a>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Organization</th>
                        <th>Amount (£)</th>
                        <th>Payment Date</th>
                        <th>Mode</th>
                        <th>Reference</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item, stat : ${items}">
                        <td class="text-muted" th:text="${stat.count}"></td>
                        <td class="fw-medium" th:text="${item.supportiveOrganization != null} ? ${item.supportiveOrganization.name} : '-'"></td>
                        <td th:text="${item.amount != null} ? '£ ' + ${#numbers.formatDecimal(item.amount, 1, 2)} : '-'"></td>
                        <td th:text="${item.paymentDate != null} ? ${#temporals.format(item.paymentDate, 'dd-MMM-yyyy')} : '-'"></td>
                        <td><span class="badge bg-primary bg-opacity-75" th:text="${item.paymentMode}"></span></td>
                        <td th:text="${item.referenceNumber != null} ? ${item.referenceNumber} : '-'"></td>
                        <td>
                            <span th:with="sc=${item.status == 'Received'} ? 'bg-success' : (${item.status == 'Failed'} ? 'bg-danger' : 'bg-secondary')"
                                  th:class="'badge ' + ${sc}"
                                  th:text="${item.status}"></span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/payments/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/payments/{id}/delete(id=${item.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this payment?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="8" class="text-center text-muted py-4">No payment records found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
