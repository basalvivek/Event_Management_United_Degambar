<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Venue Management</title></head>
<body>

<th:block layout:fragment="page-title">Venue Management</th:block>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Venue Management</h5>
        <a th:href="@{/venues/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Add New Venue
        </a>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Venue Name</th>
                        <th>Type</th>
                        <th>City</th>
                        <th>State</th>
                        <th>Capacity</th>
                        <th>Booking (£)</th>
                        <th>Discount (£)</th>
                        <th>Contact</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item, stat : ${items}">
                        <td class="text-muted" th:text="${stat.count}"></td>
                        <td class="fw-medium" th:text="${item.venueName}"></td>
                        <td><span class="badge bg-primary bg-opacity-75" th:text="${item.venueType}"></span></td>
                        <td th:text="${item.city}"></td>
                        <td th:text="${item.state}"></td>
                        <td th:text="${item.capacity != null} ? ${item.capacity} : '-'"></td>
                        <td th:text="${item.bookingPrice != null} ? ${#numbers.formatDecimal(item.bookingPrice, 1, 2)} : '-'"></td>
                        <td th:text="${item.discountPrice != null} ? ${#numbers.formatDecimal(item.discountPrice, 1, 2)} : '-'"></td>
                        <td>
                            <span th:if="${item.contactPerson != null}" th:text="${item.contactPerson}"></span>
                            <span th:if="${item.contactPhone != null}" class="text-muted d-block" style="font-size:0.78rem;" th:text="${item.contactPhone}"></span>
                            <span th:if="${item.contactPerson == null}" class="text-muted">-</span>
                        </td>
                        <td>
                            <span th:with="sc=${item.status == 'Available'} ? 'bg-success' : (${item.status == 'Booked'} ? 'bg-warning text-dark' : 'bg-danger')"
                                  th:class="'badge ' + ${sc}"
                                  th:text="${item.status}"></span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/venues/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/venues/{id}/delete(id=${item.id})}" method="post" class="d-inline"
                                  data-confirm='Delete this venue?'>
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="11" class="text-center text-muted py-4">No venues found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
