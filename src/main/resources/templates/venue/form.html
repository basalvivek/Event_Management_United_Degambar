<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add / Edit Venue</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'Add' : 'Edit'} + ' Venue'">Venue</th:block>

<div layout:fragment="content">
    <div class="card shadow-sm border-0" style="max-width:760px;">
        <div class="card-header bg-white border-bottom fw-semibold"
             th:text="${item.id == null ? 'Add New Venue' : 'Edit Venue'}"></div>
        <div class="card-body">
            <form th:action="${item.id == null ? '/venues' : '/venues/' + item.id}"
                  th:object="${item}" method="post">

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label fw-medium">Venue Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{venueName}"
                               th:classappend="${#fields.hasErrors('venueName')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{venueName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Venue Type <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{venueType}"
                                th:classappend="${#fields.hasErrors('venueType')} ? ' is-invalid'">
                            <option value="">-- Select Type --</option>
                            <option value="Temple">Temple</option>
                            <option value="Auditorium">Auditorium</option>
                            <option value="Community Hall">Community Hall</option>
                            <option value="Indoor">Indoor</option>
                            <option value="Outdoor">Outdoor</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{venueType}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}"
                                th:classappend="${#fields.hasErrors('status')} ? ' is-invalid'">
                            <option value="">-- Select Status --</option>
                            <option value="Available">Available</option>
                            <option value="Booked">Booked</option>
                            <option value="Under Maintenance">Under Maintenance</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Address <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{address}"
                               th:classappend="${#fields.hasErrors('address')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{address}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">City <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{city}"
                               th:classappend="${#fields.hasErrors('city')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{city}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">State <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{state}"
                               th:classappend="${#fields.hasErrors('state')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{state}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Post Code</label>
                        <input type="text" class="form-control" th:field="*{postCode}"
                               placeholder="e.g. HA1 2AB"
                               th:classappend="${#fields.hasErrors('postCode')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{postCode}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Capacity</label>
                        <input type="number" class="form-control" th:field="*{capacity}" min="0">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Booking Price (£)</label>
                        <div class="input-group">
                            <span class="input-group-text">£</span>
                            <input type="number" class="form-control" th:field="*{bookingPrice}"
                                   step="0.01" min="0">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Discount Price (£)</label>
                        <div class="input-group">
                            <span class="input-group-text">£</span>
                            <input type="number" class="form-control" th:field="*{discountPrice}"
                                   step="0.01" min="0">
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Facilities</label>
                        <textarea class="form-control" th:field="*{facilities}" rows="2"
                                  placeholder="e.g. Parking, AC, Stage, Sound System"
                                  th:classappend="${#fields.hasErrors('facilities')} ? ' is-invalid'"></textarea>
                        <div class="invalid-feedback" th:errors="*{facilities}"></div>
                    </div>

                </div>

                <!-- ── Contact Person Details ──────────────────────────────── -->
                <div class="mt-4 mb-1">
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <div class="d-flex align-items-center justify-content-center rounded-2"
                             style="width:28px;height:28px;background:linear-gradient(135deg,#4f46e5,#7c3aed);flex-shrink:0;">
                            <i class="bi bi-person-lines-fill text-white" style="font-size:0.75rem;"></i>
                        </div>
                        <span class="fw-semibold" style="font-size:0.92rem;">Contact Person Details</span>
                        <hr class="flex-grow-1 my-0" style="border-color:#e2e8f0;">
                    </div>

                    <!-- Primary Contact -->
                    <div class="rounded-3 p-3 mb-3"
                         style="background:#f8f7ff;border:1.5px solid #e0e7ff;">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <span class="badge rounded-pill"
                                  style="background:#4f46e5;font-size:0.67rem;letter-spacing:.4px;">PRIMARY</span>
                            <span class="fw-medium text-dark" style="font-size:0.83rem;">Primary Contact</span>
                            <span class="text-danger" style="font-size:0.75rem;">— Required</span>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">
                                    Contact Name <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-person" style="color:#4f46e5;font-size:0.85rem;"></i>
                                    </span>
                                    <input type="text" class="form-control" th:field="*{contactPerson}"
                                           placeholder="Full name"
                                           th:classappend="${#fields.hasErrors('contactPerson')} ? ' is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{contactPerson}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">
                                    Contact Phone <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-telephone" style="color:#4f46e5;font-size:0.85rem;"></i>
                                    </span>
                                    <input type="text" class="form-control" th:field="*{contactPhone}"
                                           placeholder="+44 7xxx xxxxxx"
                                           th:classappend="${#fields.hasErrors('contactPhone')} ? ' is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{contactPhone}"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Secondary Contact -->
                    <div class="rounded-3 p-3"
                         style="background:#f8fafc;border:1.5px dashed #cbd5e1;">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <span class="badge rounded-pill"
                                  style="background:#64748b;font-size:0.67rem;letter-spacing:.4px;">SECONDARY</span>
                            <span class="fw-medium text-muted" style="font-size:0.83rem;">Secondary Contact</span>
                            <span class="text-muted" style="font-size:0.75rem;">— Optional</span>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">Contact Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-person" style="color:#94a3b8;font-size:0.85rem;"></i>
                                    </span>
                                    <input type="text" class="form-control" th:field="*{secondaryContactName}"
                                           placeholder="Full name (optional)"
                                           th:classappend="${#fields.hasErrors('secondaryContactName')} ? ' is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{secondaryContactName}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium" style="font-size:0.83rem;">Contact Phone</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-telephone" style="color:#94a3b8;font-size:0.85rem;"></i>
                                    </span>
                                    <input type="text" class="form-control" th:field="*{secondaryContactPhone}"
                                           placeholder="+44 7xxx xxxxxx (optional)"
                                           th:classappend="${#fields.hasErrors('secondaryContactPhone')} ? ' is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{secondaryContactPhone}"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
                <!-- ──────────────────────────────────────────────────────── -->

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <a th:href="@{/venues}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
