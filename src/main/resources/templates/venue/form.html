<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add / Edit Venue</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'Add' : 'Edit'} + ' Venue'">Venue</th:block>

<div layout:fragment="content">
    <div class="card shadow-sm border-0" style="max-width:720px;">
        <div class="card-header bg-white border-bottom fw-semibold"
             th:text="${item.id == null ? 'Add New Venue' : 'Edit Venue'}"></div>
        <div class="card-body">
            <form th:action="${item.id == null ? '/venues' : '/venues/' + item.id}"
                  th:object="${item}" method="post">

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label fw-medium">Venue Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{venueName}"
                               th:classappend="${#fields.hasErrors('venueName')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{venueName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Venue Type <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{venueType}"
                                th:classappend="${#fields.hasErrors('venueType')} ? ' is-invalid'">
                            <option value="">-- Select Type --</option>
                            <option value="Temple">Temple</option>
                            <option value="Auditorium">Auditorium</option>
                            <option value="Community Hall">Community Hall</option>
                            <option value="Indoor">Indoor</option>
                            <option value="Outdoor">Outdoor</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{venueType}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}"
                                th:classappend="${#fields.hasErrors('status')} ? ' is-invalid'">
                            <option value="">-- Select Status --</option>
                            <option value="Available">Available</option>
                            <option value="Booked">Booked</option>
                            <option value="Under Maintenance">Under Maintenance</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Address <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{address}"
                               th:classappend="${#fields.hasErrors('address')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{address}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">City <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{city}"
                               th:classappend="${#fields.hasErrors('city')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{city}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">State <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{state}"
                               th:classappend="${#fields.hasErrors('state')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{state}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Capacity</label>
                        <input type="number" class="form-control" th:field="*{capacity}" min="0">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Booking Price (£)</label>
                        <div class="input-group">
                            <span class="input-group-text">£</span>
                            <input type="number" class="form-control" th:field="*{bookingPrice}"
                                   step="0.01" min="0">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Discount Price (£)</label>
                        <div class="input-group">
                            <span class="input-group-text">£</span>
                            <input type="number" class="form-control" th:field="*{discountPrice}"
                                   step="0.01" min="0">
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Contact Person</label>
                        <input type="text" class="form-control" th:field="*{contactPerson}"
                               th:classappend="${#fields.hasErrors('contactPerson')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{contactPerson}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-medium">Contact Phone</label>
                        <input type="text" class="form-control" th:field="*{contactPhone}"
                               th:classappend="${#fields.hasErrors('contactPhone')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{contactPhone}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Facilities</label>
                        <textarea class="form-control" th:field="*{facilities}" rows="2"
                                  placeholder="e.g. Parking, AC, Stage, Sound System"
                                  th:classappend="${#fields.hasErrors('facilities')} ? ' is-invalid'"></textarea>
                        <div class="invalid-feedback" th:errors="*{facilities}"></div>
                    </div>

                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <a th:href="@{/venues}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
