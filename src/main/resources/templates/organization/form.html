<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Organization Form</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'Add Organization' : 'Edit Organization'}">Organization</th:block>

<div layout:fragment="content">

    <div class="card shadow-sm border-0" style="max-width: 820px;">
        <div class="card-header bg-white border-bottom d-flex align-items-center gap-2 py-3">
            <i class="bi bi-building text-primary fs-5"></i>
            <span class="fw-semibold"
                  th:text="${item.id == null ? 'Add New Organization' : 'Edit Organization'}"></span>
        </div>
        <div class="card-body">

            <form th:action="${item.id == null ? '/organization' : '/organization/' + item.id}"
                  th:object="${item}" method="post" enctype="multipart/form-data">

                <!-- ── Logo Upload ── -->
                <div class="mb-4 p-3 rounded-3" style="background:#f8f9fa; border:1px dashed #dee2e6;">
                    <label class="form-label fw-medium mb-2">
                        <i class="bi bi-image me-1 text-primary"></i>Organization Logo
                    </label>
                    <div class="d-flex align-items-center gap-3 flex-wrap">

                        <!-- Current / Preview image -->
                        <div id="logoPreviewWrap">
                            <img th:if="${item.logoData != null}"
                                 th:src="@{/organization/{id}/logo(id=${item.id})}"
                                 id="logoPreview"
                                 alt="Logo"
                                 style="width:90px;height:90px;object-fit:contain;border-radius:10px;border:1px solid #dee2e6;background:#fff;padding:4px;">
                            <div th:unless="${item.logoData != null}"
                                 id="logoPlaceholder"
                                 style="width:90px;height:90px;border-radius:10px;border:2px dashed #ced4da;background:#fff;display:flex;align-items:center;justify-content:center;">
                                <i class="bi bi-building text-muted fs-2"></i>
                            </div>
                        </div>

                        <div>
                            <input type="file" class="form-control form-control-sm" id="logoFile"
                                   name="logoFile" accept="image/jpeg,image/png,image/gif,image/webp"
                                   style="max-width:280px;"
                                   onchange="previewLogo(this)">
                            <div class="form-text mt-1">
                                JPG, PNG, GIF or WEBP &nbsp;·&nbsp; Max 2 MB
                                <span th:if="${item.logoData != null}" class="text-muted">
                                    &nbsp;·&nbsp; Leave blank to keep current logo
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Row 1: Name + Registration -->
                <div class="row g-3 mb-3">
                    <div class="col-md-7">
                        <label class="form-label fw-medium">Organization Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="Enter organization name"
                               th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label fw-medium">Registration Number</label>
                        <input type="text" class="form-control" th:field="*{registrationNumber}" placeholder="e.g. TRUST/2005/001">
                    </div>
                </div>

                <!-- Row 2: Trust Type + Established Year -->
                <div class="row g-3 mb-3">
                    <div class="col-md-7">
                        <label class="form-label fw-medium">Trust Type</label>
                        <input type="text" class="form-control" th:field="*{trustType}" placeholder="e.g. Charitable Trust">
                    </div>
                    <div class="col-md-5">
                        <label class="form-label fw-medium">Established Year</label>
                        <input type="number" class="form-control" th:field="*{establishedYear}" placeholder="e.g. 1985"
                               th:classappend="${#fields.hasErrors('establishedYear')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{establishedYear}"></div>
                    </div>
                </div>

                <!-- Row 3: Address -->
                <div class="mb-3">
                    <label class="form-label fw-medium">Address</label>
                    <input type="text" class="form-control" th:field="*{address}" placeholder="Street address">
                </div>

                <!-- Row 4: City, State, Pincode -->
                <div class="row g-3 mb-3">
                    <div class="col-md-5">
                        <label class="form-label fw-medium">City</label>
                        <input type="text" class="form-control" th:field="*{city}" placeholder="City">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-medium">State</label>
                        <input type="text" class="form-control" th:field="*{state}" placeholder="State">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-medium">Pincode</label>
                        <input type="text" class="form-control" th:field="*{pincode}" placeholder="000000">
                    </div>
                </div>

                <!-- Row 5: Phone, Email, Website -->
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-medium">Phone</label>
                        <input type="text" class="form-control" th:field="*{phone}" placeholder="+91 00000 00000">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-medium">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" placeholder="contact@trust.org"
                               th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-medium">Website</label>
                        <input type="text" class="form-control" th:field="*{website}" placeholder="www.trust.org">
                    </div>
                </div>

                <!-- Row 6: Description -->
                <div class="mb-4">
                    <label class="form-label fw-medium">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"
                              placeholder="Brief description of the organization"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <a th:href="@{/}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>

    <!-- ── Banner Upload (edit only) ── -->
    <div th:if="${item.id != null}" class="mt-4" style="max-width:820px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom d-flex align-items-center gap-2 py-3">
                <i class="bi bi-image-fill text-success fs-5"></i>
                <span class="fw-semibold">Organization Banner</span>
            </div>
            <div class="card-body">

                <!-- Current banner -->
                <div th:if="${item.bannerImage != null}" class="mb-3">
                    <img th:src="@{/organization/{id}/banner(id=${item.id})}"
                         alt="Banner"
                         style="max-width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:1px solid #dee2e6;">
                    <div class="mt-2">
                        <form th:action="@{/organization/{id}/banner/delete(id=${item.id})}" method="post" class="d-inline"
                              data-confirm='Remove the banner?'>
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash me-1"></i>Remove Banner
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Upload form -->
                <form th:action="@{/organization/{id}/banner(id=${item.id})}"
                      method="post" enctype="multipart/form-data"
                      class="d-flex align-items-center gap-3 flex-wrap">
                    <input type="file" class="form-control form-control-sm" name="bannerFile"
                           accept="image/jpeg,image/png,image/webp"
                           style="max-width:320px;"
                           onchange="previewBanner(this)">
                    <button type="submit" class="btn btn-outline-success btn-sm px-3">
                        <i class="bi bi-upload me-1"></i><span th:text="${item.bannerImage != null ? 'Replace Banner' : 'Upload Banner'}">Upload Banner</span>
                    </button>
                    <span class="form-text">JPG, PNG or WEBP &nbsp;·&nbsp; Max 2 MB</span>
                </form>

                <!-- Inline preview -->
                <div id="bannerPreviewWrap" class="mt-3" style="display:none;">
                    <img id="bannerPreview" alt="Preview"
                         style="max-width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:1px solid #dee2e6;">
                </div>

            </div>
        </div>
    </div>

    <!-- ── Display Pictures (edit only) ── -->
    <div th:if="${item.id != null}" class="mt-4" style="max-width:820px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom d-flex align-items-center justify-content-between py-3">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-images text-primary fs-5"></i>
                    <span class="fw-semibold">Display Pictures</span>
                </div>
                <span class="badge bg-secondary rounded-pill"
                      th:text="${displayPictureCount} + ' / 5'">0 / 5</span>
            </div>
            <div class="card-body">

                <!-- Thumbnail grid -->
                <div class="row g-3 mb-3" th:if="${displayPictures != null and not #lists.isEmpty(displayPictures)}">
                    <div class="col-auto" th:each="pic : ${displayPictures}">
                        <div class="position-relative" style="width:130px;">
                            <img th:src="@{/organization/display-pictures/{id}(id=${pic.id})}"
                                 alt="Display picture"
                                 style="width:130px;height:95px;object-fit:cover;border-radius:8px;border:1px solid #dee2e6;">
                            <form th:action="@{/organization/display-pictures/{id}/delete(id=${pic.id})}"
                                  method="post" class="d-inline"
                                  data-confirm='Remove this picture?'>
                                <input type="hidden" name="orgId" th:value="${item.id}">
                                <button type="submit"
                                        class="btn btn-danger btn-sm position-absolute top-0 end-0"
                                        style="padding:2px 7px;border-radius:0 8px 0 6px;line-height:1.4;">
                                    <i class="bi bi-x-lg" style="font-size:0.7rem;"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Empty state -->
                <div th:if="${displayPictures == null or #lists.isEmpty(displayPictures)}"
                     class="text-center text-muted py-3 mb-3" style="font-size:0.84rem;">
                    <i class="bi bi-images d-block mb-1" style="font-size:1.9rem;opacity:0.28;"></i>
                    No display pictures yet.
                </div>

                <!-- Upload form — hidden when 5 reached -->
                <div th:if="${displayPictureCount < 5}">
                    <form th:action="@{/organization/{id}/display-pictures(id=${item.id})}"
                          method="post" enctype="multipart/form-data"
                          class="d-flex align-items-center gap-3 flex-wrap">
                        <input type="file" class="form-control form-control-sm" name="displayPicFile"
                               accept="image/jpeg,image/png,image/webp" style="max-width:280px;">
                        <button type="submit" class="btn btn-outline-primary btn-sm px-3">
                            <i class="bi bi-upload me-1"></i>Upload
                        </button>
                        <span class="form-text">JPG, PNG or WEBP &nbsp;·&nbsp; Max 2 MB</span>
                    </form>
                </div>

                <div th:if="${displayPictureCount >= 5}"
                     class="alert alert-info mb-0 py-2" style="font-size:0.83rem;">
                    <i class="bi bi-info-circle me-1"></i>
                    Maximum 5 pictures reached. Delete one to upload another.
                </div>

            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="page-scripts">
<script>
function previewBanner(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('bannerPreview').src = e.target.result;
            document.getElementById('bannerPreviewWrap').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
function previewLogo(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var preview = document.getElementById('logoPreview');
            var placeholder = document.getElementById('logoPlaceholder');
            if (!preview) {
                preview = document.createElement('img');
                preview.id = 'logoPreview';
                preview.style = 'width:90px;height:90px;object-fit:contain;border-radius:10px;border:1px solid #dee2e6;background:#fff;padding:4px;';
                preview.alt = 'Logo';
                document.getElementById('logoPreviewWrap').innerHTML = '';
                document.getElementById('logoPreviewWrap').appendChild(preview);
            }
            if (placeholder) placeholder.style.display = 'none';
            preview.src = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
</th:block>

</body>
</html>
