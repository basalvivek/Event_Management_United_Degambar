<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
<title>Supportive Organization</title>
<style>
.so-hero{background:linear-gradient(135deg,#1e1b4b 0%,#3730a3 60%,#4f46e5 100%);border-radius:16px;padding:28px 32px;margin-bottom:24px;position:relative;overflow:hidden;}
.so-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.04);}
.so-hero::after{content:'';position:absolute;bottom:-60px;right:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.03);}
.so-hero-icon{width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;flex-shrink:0;border:1px solid rgba(255,255,255,0.15);}
.so-hero-title{font-size:1.2rem;font-weight:700;color:#fff;margin:0;}
.so-hero-sub{font-size:0.78rem;color:rgba(255,255,255,0.6);margin:2px 0 0;}
.section-card{border:none;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:20px;overflow:hidden;}
.section-hdr{padding:11px 20px;display:flex;align-items:center;gap:9px;font-size:0.75rem;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;}
.section-hdr i{font-size:1rem;}
.hdr-indigo{background:linear-gradient(90deg,#eef2ff,#e0e7ff);color:#3730a3;}
.hdr-teal{background:linear-gradient(90deg,#f0fdfa,#ccfbf1);color:#0f766e;}
.hdr-violet{background:linear-gradient(90deg,#faf5ff,#ede9fe);color:#6d28d9;}
.hdr-slate{background:linear-gradient(90deg,#f8fafc,#f1f5f9);color:#475569;}
.section-body{padding:20px;background:#fff;}
.form-label{font-size:0.8rem;font-weight:600;color:#374151;margin-bottom:5px;}
.form-control,.form-select{font-size:0.875rem;border-radius:8px;border:1.5px solid #e5e7eb;transition:border-color .18s,box-shadow .18s;}
.form-control:focus,.form-select:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.1);outline:none;}
.req{color:#ef4444;}
.logo-drop{border:2px dashed #c7d2fe;border-radius:12px;background:linear-gradient(135deg,#fafafe,#f5f3ff);padding:20px;transition:border-color .18s,background .18s;}
.logo-drop:hover{border-color:#6366f1;background:#f5f3ff;}
.logo-wrap{width:88px;height:88px;border-radius:12px;border:1.5px solid #e0e7ff;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(79,70,229,0.1);}
.logo-wrap img{width:100%;height:100%;object-fit:contain;padding:4px;}
.action-bar{background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 2px 12px rgba(0,0,0,0.06);display:flex;align-items:center;gap:12px;}
</style>
</head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'Add Supportive Organization' : 'Edit Supportive Organization'}">
    Supportive Organization
</th:block>

<div layout:fragment="content">
<div style="max-width:860px;">

    <!-- Hero -->
    <div class="so-hero mb-4"
         th:style="${formType == 'sponsor'} ? 'background:linear-gradient(135deg,#78350f 0%,#b45309 60%,#d97706 100%)' : ''">
        <div class="d-flex align-items-center gap-3">
            <div class="so-hero-icon"
                 th:style="${formType == 'sponsor'} ? 'background:rgba(255,255,255,0.15);' : ''">
                <i th:class="${formType == 'sponsor'} ? 'bi bi-award-fill' : 'bi bi-people-fill'"></i>
            </div>
            <div>
                <div class="so-hero-title"
                     th:text="${formType == 'sponsor'} ? (${item.id == null} ? 'Add Sponsor' : 'Edit Sponsor') : (${item.id == null} ? 'Add Supportive Organization' : 'Edit Supportive Organization')">
                    Supportive Organization
                </div>
                <div class="so-hero-sub"
                     th:text="${formType == 'sponsor'} ? 'Sponsor details and sponsorship tier' : 'Partner &amp; supporting organisation details'">
                    details
                </div>
            </div>
        </div>
    </div>

    <form th:action="${item.id == null ? '/supportive' : '/supportive/' + item.id}"
          th:object="${item}" method="post" enctype="multipart/form-data">

        <!-- Section 1: Identity -->
        <div class="section-card">
            <div class="section-hdr hdr-indigo">
                <i class="bi bi-building-fill"></i> Organisation Identity
            </div>
            <div class="section-body">

                <!-- Logo Upload -->
                <div class="logo-drop mb-4">
                    <div class="d-flex align-items-center gap-4 flex-wrap">
                        <div class="logo-wrap" id="logoWrap">
                            <img th:if="${item.logoPath != null}" th:src="${item.logoPath}"
                                 id="logoPreview" alt="Logo">
                            <i th:unless="${item.logoPath != null}"
                               class="bi bi-people text-muted" style="font-size:2rem;" id="logoIcon"></i>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-semibold mb-1" style="font-size:.82rem;color:#3730a3;">Organisation Logo</div>
                            <input type="file" class="form-control form-control-sm" id="logoFile"
                                   name="logoFile" accept="image/jpeg,image/png,image/gif,image/webp"
                                   style="max-width:300px;" onchange="previewLogo(this)">
                            <div class="form-text mt-1" style="font-size:.72rem;">
                                <i class="bi bi-info-circle me-1"></i>JPG, PNG, GIF or WEBP &nbsp;·&nbsp; Max 5 MB
                                <span th:if="${item.logoPath != null}" class="text-muted">
                                    &nbsp;·&nbsp; Leave blank to keep current logo
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-7">
                        <label class="form-label">Organisation Name <span class="req">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}"
                               placeholder="e.g. Harrow Jain Sangh"
                               th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Organisation Type</label>
                        <select class="form-select" th:field="*{organizationType}">
                            <option value="">— Select type —</option>
                            <!-- Sponsor form: only sponsor-relevant types -->
                            <th:block th:if="${formType == 'sponsor'}">
                                <option value="Group Sponsor">Group Sponsor</option>
                                <option value="Individual Sponsor">Individual Sponsor</option>
                                <option value="Other">Other</option>
                            </th:block>
                            <!-- Standard org form: full list -->
                            <th:block th:unless="${formType == 'sponsor'}">
                                <option value="Religious Trust">Religious Trust</option>
                                <option value="Charitable Trust">Charitable Trust</option>
                                <option value="NGO">NGO</option>
                                <option value="Corporate">Corporate</option>
                                <option value="Government Body">Government Body</option>
                                <option value="Educational Institution">Educational Institution</option>
                                <option value="Individual Sponsor">Individual Sponsor</option>
                                <option value="Other">Other</option>
                            </th:block>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sponsorship Details — shown only for sponsor form type -->
        <div class="section-card" th:if="${formType == 'sponsor' or (item.sponsorshipType != null and !#strings.isEmpty(item.sponsorshipType))}">
            <div class="section-hdr" style="background:linear-gradient(90deg,#fffbeb,#fef3c7);color:#92400e;border-bottom:2px solid #fde68a;">
                <i class="bi bi-award-fill" style="color:#d97706;"></i> Sponsorship Details
            </div>
            <div class="section-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label">Sponsorship Tier <span class="req">*</span></label>
                        <select class="form-select" th:field="*{sponsorshipType}"
                                style="border-color:#fde68a;">
                            <option value="">— Select tier —</option>
                            <option value="Platinum">Platinum</option>
                            <option value="Gold">Gold</option>
                            <option value="Silver">Silver</option>
                            <option value="Bronze">Bronze</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-7">
                        <!-- Tier visual guide -->
                        <div class="d-flex gap-2 flex-wrap pb-1">
                            <span style="background:#e8eaf6;color:#1a237e;border-radius:20px;padding:4px 14px;font-size:.73rem;font-weight:700;border:1.5px solid #c5cae9;">
                                <i class="bi bi-gem me-1"></i>Platinum
                            </span>
                            <span style="background:#fef9c3;color:#713f12;border-radius:20px;padding:4px 14px;font-size:.73rem;font-weight:700;border:1.5px solid #fde68a;">
                                <i class="bi bi-trophy-fill me-1"></i>Gold
                            </span>
                            <span style="background:#f1f5f9;color:#475569;border-radius:20px;padding:4px 14px;font-size:.73rem;font-weight:700;border:1.5px solid #cbd5e1;">
                                <i class="bi bi-award me-1"></i>Silver
                            </span>
                            <span style="background:#fff7ed;color:#9a3412;border-radius:20px;padding:4px 14px;font-size:.73rem;font-weight:700;border:1.5px solid #fed7aa;">
                                <i class="bi bi-award me-1"></i>Bronze
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 2: Contact Details -->
        <div class="section-card">
            <div class="section-hdr hdr-teal">
                <i class="bi bi-person-lines-fill"></i> Contact Details
            </div>
            <div class="section-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Contact Person</label>
                        <div class="input-group">
                            <span class="input-group-text" style="border-radius:8px 0 0 8px;background:#f0fdfa;border-color:#e5e7eb;">
                                <i class="bi bi-person" style="color:#0f766e;"></i>
                            </span>
                            <input type="text" class="form-control" th:field="*{contactPerson}"
                                   placeholder="Full name" style="border-radius:0 8px 8px 0;">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Contact Phone</label>
                        <div class="input-group">
                            <span class="input-group-text" style="border-radius:8px 0 0 8px;background:#f0fdfa;border-color:#e5e7eb;">
                                <i class="bi bi-telephone" style="color:#0f766e;"></i>
                            </span>
                            <input type="text" class="form-control" th:field="*{contactPhone}"
                                   placeholder="+44 7700 000000" style="border-radius:0 8px 8px 0;">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Contact Email</label>
                        <div class="input-group">
                            <span class="input-group-text" style="border-radius:8px 0 0 8px;background:#f0fdfa;border-color:#e5e7eb;">
                                <i class="bi bi-envelope" style="color:#0f766e;"></i>
                            </span>
                            <input type="email" class="form-control" th:field="*{contactEmail}"
                                   placeholder="contact@org.com" style="border-radius:0 8px 8px 0;"
                                   th:classappend="${#fields.hasErrors('contactEmail')} ? ' is-invalid'">
                            <div class="invalid-feedback" th:errors="*{contactEmail}"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 3: Location & Web -->
        <div class="section-card">
            <div class="section-hdr hdr-violet">
                <i class="bi bi-geo-alt-fill"></i> Location &amp; Web
            </div>
            <div class="section-body">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <div class="input-group">
                            <span class="input-group-text" style="border-radius:8px 0 0 8px;background:#faf5ff;border-color:#e5e7eb;">
                                <i class="bi bi-house" style="color:#6d28d9;"></i>
                            </span>
                            <input type="text" class="form-control" th:field="*{address}"
                                   placeholder="Street address" style="border-radius:0 8px 8px 0;">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" th:field="*{city}" placeholder="e.g. London">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">County / State</label>
                        <input type="text" class="form-control" th:field="*{state}" placeholder="e.g. Greater London">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Website</label>
                        <div class="input-group">
                            <span class="input-group-text" style="border-radius:8px 0 0 8px;background:#faf5ff;border-color:#e5e7eb;">
                                <i class="bi bi-globe" style="color:#6d28d9;"></i>
                            </span>
                            <input type="text" class="form-control" th:field="*{website}"
                                   placeholder="www.org.com" style="border-radius:0 8px 8px 0;">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 4: Description -->
        <div class="section-card">
            <div class="section-hdr hdr-slate">
                <i class="bi bi-text-paragraph"></i> Description
            </div>
            <div class="section-body">
                <textarea class="form-control" th:field="*{description}" rows="3"
                          placeholder="Brief description of this organisation's support role…"></textarea>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
            <button type="submit" class="btn px-4 fw-semibold text-white"
                    style="background:linear-gradient(135deg,#4f46e5,#6366f1);border:0;border-radius:10px;box-shadow:0 4px 12px rgba(79,70,229,0.3);">
                <i class="bi bi-check-lg me-1"></i>
                <span th:text="${item.id == null ? 'Save Organisation' : 'Update Organisation'}">Save</span>
            </button>
            <a th:href="@{/supportive}" class="btn btn-outline-secondary px-4"
               style="border-radius:10px;">
                <i class="bi bi-arrow-left me-1"></i>Cancel
            </a>
            <div th:if="${item.id != null}" class="ms-auto">
                <span class="badge rounded-pill" style="background:#eef2ff;color:#4338ca;font-size:.72rem;padding:6px 14px;">
                    <i class="bi bi-pencil-square me-1"></i>Editing Record #<span th:text="${item.id}"></span>
                </span>
            </div>
        </div>

    </form>
</div>
</div>

<th:block layout:fragment="page-scripts">
<script>
function previewLogo(input) {
    if (!input.files || !input.files[0]) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        var wrap = document.getElementById('logoWrap');
        wrap.innerHTML = '<img id="logoPreview" alt="Logo" style="width:100%;height:100%;object-fit:contain;padding:4px;" src="' + e.target.result + '">';
    };
    reader.readAsDataURL(input.files[0]);
}
</script>
</th:block>

</body>
</html>
