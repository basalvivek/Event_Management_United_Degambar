<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
<title>Gallery</title>
<style>
    .upload-zone {
        border: 2.5px dashed #c7d2fe; border-radius: 18px;
        padding: 36px 24px; text-align: center; background: #f8f7ff;
        cursor: pointer; transition: all 0.2s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
        border-color: #6366f1; background: #eef2ff;
    }
    .upload-zone i { font-size: 2.4rem; color: #a5b4fc; }
    .upload-zone .hint { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }

    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 14px;
    }
    .gallery-item {
        position: relative; aspect-ratio: 1;
        border-radius: 14px; overflow: hidden;
        box-shadow: 0 3px 12px rgba(99,102,241,0.12);
        background: #e0e7ff;
    }
    .gallery-item img {
        width: 100%; height: 100%; object-fit: cover;
        transition: transform 0.22s;
        display: block;
    }
    .gallery-item:hover img { transform: scale(1.06); }
    .gallery-item .del-btn {
        position: absolute; top: 7px; right: 7px;
        opacity: 1;
    }

    .selected-label {
        display: inline-block; background: #eef2ff; color: #4f46e5;
        border-radius: 20px; padding: 3px 12px; font-size: 0.76rem; font-weight: 600;
    }

    .disabled-zone { opacity: 0.45; cursor: not-allowed !important; pointer-events: none; }
    html.dark .upload-zone { background: #13132a; border-color: #2a2a4a; }
    html.dark .upload-zone:hover { background: rgba(79,70,229,.1); border-color: #6366f1; }
    html.dark .gallery-item { box-shadow: 0 3px 14px rgba(0,0,0,.4); background: #1a1a32; }
</style>
</head>
<body>

<th:block layout:fragment="page-title">Gallery</th:block>

<div layout:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
        <div>
            <h5 class="fw-bold mb-0" style="color:#1e1b4b;">Community Gallery</h5>
            <div class="d-flex align-items-center gap-2 mt-1">
                <div style="width:140px;height:6px;background:#e2e8f0;border-radius:4px;overflow:hidden;">
                    <div th:style="'width:' + (${photoCount} * 100 / ${maxPhotos}) + '%;height:100%;border-radius:4px;background:' + (${photoCount} >= ${maxPhotos} ? '#ef4444' : '#6366f1') + ';transition:width 0.3s;'"></div>
                </div>
                <span class="text-muted" style="font-size:0.78rem;">
                    <span th:text="${photoCount}"></span> / <span th:text="${maxPhotos}"></span> photos
                    <span th:if="${photoCount} >= ${maxPhotos}" class="text-danger fw-semibold ms-1">(Full)</span>
                </span>
            </div>
        </div>
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()"
                th:disabled="${photoCount} >= ${maxPhotos}">
            <i class="bi bi-cloud-upload me-1"></i>Upload Photos
        </button>
    </div>

    <!-- Upload card — always visible -->
    <div class="card border-0 shadow-sm mb-4" style="border-radius:16px;">
        <div class="card-body p-3">

            <!-- Full warning -->
            <div th:if="${photoCount} >= ${maxPhotos}"
                 class="alert alert-warning d-flex align-items-center gap-2 mb-3 py-2"
                 style="border-radius:10px;font-size:0.85rem;">
                <i class="bi bi-exclamation-triangle-fill text-warning"></i>
                Gallery is full (25/25). Delete a photo below to free a slot, then upload.
            </div>

            <form th:action="@{/gallery/upload}" method="post" enctype="multipart/form-data" id="uploadForm">
                <input type="file" id="fileInput" name="files" multiple accept="image/*"
                       class="d-none" onchange="onFilesChosen(this)"
                       th:disabled="${photoCount} >= ${maxPhotos}">

                <div class="upload-zone" id="uploadZone"
                     th:classappend="${photoCount} >= ${maxPhotos} ? ' disabled-zone'"
                     th:onclick="${photoCount} < ${maxPhotos} ? 'document.getElementById(\'fileInput\').click()' : ''"
                     ondragover="event.preventDefault();this.classList.add('drag-over')"
                     ondragleave="this.classList.remove('drag-over')"
                     ondrop="onDrop(event)">
                    <i class="bi bi-images"></i>
                    <div class="fw-semibold mt-2" style="color:#6366f1;">Click to choose photos</div>
                    <div class="hint">or drag &amp; drop &nbsp;·&nbsp; JPEG, PNG, WEBP &nbsp;·&nbsp; multiple files</div>
                </div>

                <div id="selectedInfo" class="mt-2" style="display:none;">
                    <span id="selectedLabel" class="selected-label"></span>
                    <button type="submit" class="btn btn-primary btn-sm ms-2"
                            th:disabled="${photoCount} >= ${maxPhotos}">
                        <i class="bi bi-upload me-1"></i>Upload Now
                    </button>
                    <button type="button" class="btn btn-outline-secondary btn-sm ms-1"
                            onclick="clearSelection()">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(images)}" class="text-center py-5">
        <i class="bi bi-camera d-block mb-2" style="font-size:3rem;color:#c7d2fe;"></i>
        <div class="fw-bold mb-1" style="color:#6366f1;">No photos yet</div>
        <p class="text-muted small">Upload your first community photos above.</p>
    </div>

    <!-- Photo grid -->
    <div class="gallery-grid" th:unless="${#lists.isEmpty(images)}">
        <div class="gallery-item" th:each="img : ${images}">
            <img th:src="@{/gallery/{id}/image(id=${img.id})}"
                 th:alt="${img.originalName}" loading="lazy">
            <div class="del-btn">
                <form th:action="@{/gallery/{id}/delete(id=${img.id})}" method="post"
                      data-confirm="Delete this photo from the gallery?">
                    <button type="submit"
                            class="btn btn-sm btn-danger"
                            style="border-radius:8px;padding:4px 8px;font-size:0.75rem;">
                        <i class="bi bi-trash-fill"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="page-scripts">
<script>
function onFilesChosen(input) {
    if (input.files.length > 0) {
        document.getElementById('selectedLabel').textContent = input.files.length + ' file(s) selected';
        document.getElementById('selectedInfo').style.display = 'block';
    } else {
        clearSelection();
    }
}
function onDrop(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('drag-over');
    var dt = e.dataTransfer;
    if (dt && dt.files.length) {
        document.getElementById('fileInput').files = dt.files;
        onFilesChosen(document.getElementById('fileInput'));
    }
}
function clearSelection() {
    document.getElementById('fileInput').value = '';
    document.getElementById('selectedInfo').style.display = 'none';
}
</script>
</th:block>

</body>
</html>
