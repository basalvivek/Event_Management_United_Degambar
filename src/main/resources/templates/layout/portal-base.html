<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - Member Portal">Member Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { background: #f5f6fa; font-family: 'Segoe UI', system-ui, sans-serif; }

        /* ── Portal Navbar ── */
        #portal-nav {
            position: sticky; top: 0; z-index: 1000;
            background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 0 24px;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .pnav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .pnav-brand img {
            width: 40px; height: 40px; object-fit: contain; border-radius: 8px;
        }
        .pnav-brand-text { font-size: 0.83rem; font-weight: 700; color: #1a1a2e; line-height: 1.3; }
        .pnav-brand-text small { display: block; font-weight: 400; color: #888; font-size: 0.68rem; }

        .pnav-right { display: flex; align-items: center; gap: 16px; }

        .member-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            object-fit: cover; border: 2px solid #e5e7eb;
        }
        .member-avatar-placeholder {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 0.85rem;
        }

        .member-dropdown .dropdown-toggle {
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px; border-radius: 10px;
            transition: background 0.15s;
        }
        .member-dropdown .dropdown-toggle:hover { background: #f3f4f6; }
        .member-welcome { font-size: 0.82rem; font-weight: 600; color: #1a1a2e; }
        .member-role { font-size: 0.68rem; color: #10b981; font-weight: 500; }

        .dropdown-menu { border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); padding: 6px; min-width: 180px; }
        .dropdown-item { border-radius: 8px; font-size: 0.83rem; padding: 8px 12px; color: #374151; }
        .dropdown-item:hover { background: #f3f4f6; color: #1a1a2e; }
        .dropdown-item i { width: 18px; }
        .dropdown-divider { margin: 4px 0; border-color: #f3f4f6; }

        /* ── Content ── */
        #portal-content { min-height: calc(100vh - 64px); }

        /* ── Alert ── */
        .alert { border: none; border-radius: 10px; }

        /* ── Empty state ── */
        .empty-state {
            text-align: center; padding: 40px 20px; color: #9ca3af;
        }
        .empty-state i { font-size: 2.5rem; opacity: 0.35; display: block; margin-bottom: 10px; }
        .empty-state p { font-size: 0.87rem; font-style: italic; max-width: 320px; margin: 0 auto; }
    </style>
</head>
<body>

<!-- ═══ PORTAL NAV ═══ -->
<nav id="portal-nav">

    <!-- Left: brand -->
    <a class="pnav-brand" th:href="@{/portal}">
        <img th:if="${org != null and org.logoPath != null}"
             th:src="${org.logoPath}" alt="Logo">
        <img th:unless="${org != null and org.logoPath != null}"
             th:src="@{/images/logo.jpeg}" alt="Logo">
        <div class="pnav-brand-text">
            <span th:text="${org != null ? org.name : 'UDJCS'}">UDJCS</span>
            <small>Member Portal</small>
        </div>
    </a>

    <!-- Right: member dropdown -->
    <div class="pnav-right" th:if="${memberUser != null}">
        <div class="member-dropdown dropdown">
            <button class="dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                <!-- Avatar -->
                <img th:if="${memberUser.profilePicture != null}"
                     th:src="@{/members/{id}/photo(id=${memberUser.id})}"
                     class="member-avatar" alt="Photo">
                <div th:unless="${memberUser.profilePicture != null}"
                     class="member-avatar-placeholder"
                     th:text="${#strings.substring(memberUser.firstName,0,1)}">M</div>

                <div class="text-start">
                    <div class="member-welcome" th:text="'Welcome, ' + ${memberUser.firstName}">Welcome</div>
                    <div class="member-role">Member</div>
                </div>
                <i class="bi bi-chevron-down" style="font-size:0.7rem;color:#9ca3af;"></i>
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item" th:href="@{/portal/settings}">
                        <i class="bi bi-gear me-2 text-muted"></i>Settings
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" th:href="@{/portal/contact}">
                        <i class="bi bi-envelope me-2 text-muted"></i>Contact Us
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/portal/logout}" method="post" class="d-inline">
                        <button type="submit" class="dropdown-item text-danger">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>

</nav>

<!-- ═══ CONTENT ═══ -->
<div id="portal-content">
    <div th:if="${success}" class="container-fluid px-4 pt-3">
        <div class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
    <div th:if="${error}" class="container-fluid px-4 pt-3">
        <div class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
    <div layout:fragment="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:400px;">
        <div class="modal-content border-0" style="border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.18);">
            <div class="modal-body text-center px-4 pt-4 pb-3">
                <div id="confirmIconWrap" class="mx-auto mb-3 d-flex align-items-center justify-content-center"
                     style="width:64px;height:64px;border-radius:50%;">
                    <i id="confirmIcon" style="font-size:1.9rem;"></i>
                </div>
                <h5 id="confirmTitle" class="fw-bold mb-2" style="font-size:1.05rem;color:#1a1a2e;"></h5>
                <p id="confirmMessage" class="text-muted mb-0" style="font-size:0.87rem;line-height:1.6;"></p>
            </div>
            <div class="modal-footer border-0 justify-content-center gap-3 pb-4 pt-1">
                <button type="button" class="btn btn-outline-secondary px-4 rounded-pill"
                        data-bs-dismiss="modal" style="font-size:0.86rem;">
                    <i class="bi bi-x me-1"></i>Cancel
                </button>
                <button type="button" id="confirmBtn" class="btn px-4 rounded-pill"
                        style="font-size:0.86rem;">
                    <i id="confirmBtnIcon" class="me-1"></i><span id="confirmBtnText">Confirm</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    var pendingForm = null;
    var modal = null;
    function getStyle(msg) {
        var m = (msg || '').toLowerCase();
        if (m.indexOf('approve') >= 0)
            return { bg:'#f0fdf4', color:'#16a34a', icon:'bi-check-circle-fill',
                     title:'Confirm Approval', btnClass:'btn-success', btnIcon:'bi-check-lg', btnText:'Approve' };
        if (m.indexOf('remove') >= 0 || m.indexOf('delete') >= 0)
            return { bg:'#fef2f2', color:'#dc2626', icon:'bi-trash3-fill',
                     title:'Confirm Delete', btnClass:'btn-danger', btnIcon:'bi-trash3', btnText:'Delete' };
        return { bg:'#fffbeb', color:'#d97706', icon:'bi-exclamation-triangle-fill',
                 title:'Confirm Action', btnClass:'btn-warning', btnIcon:'bi-check-lg', btnText:'Confirm' };
    }
    document.addEventListener('DOMContentLoaded', function () {
        modal = new bootstrap.Modal(document.getElementById('confirmModal'));
        document.addEventListener('submit', function (e) {
            var form = e.target;
            var msg = form.getAttribute('data-confirm');
            if (!msg) return;
            e.preventDefault();
            pendingForm = form;
            var s = getStyle(msg);
            document.getElementById('confirmIconWrap').style.background = s.bg;
            var ic = document.getElementById('confirmIcon');
            ic.style.color = s.color; ic.className = 'bi ' + s.icon;
            document.getElementById('confirmTitle').textContent = s.title;
            document.getElementById('confirmMessage').textContent = msg;
            var btn = document.getElementById('confirmBtn');
            btn.className = 'btn px-4 rounded-pill ' + s.btnClass;
            document.getElementById('confirmBtnIcon').className = 'bi ' + s.btnIcon + ' me-1';
            document.getElementById('confirmBtnText').textContent = s.btnText;
            modal.show();
        });
        document.getElementById('confirmBtn').addEventListener('click', function () {
            modal.hide();
            if (pendingForm) { var f = pendingForm; pendingForm = null; f.removeAttribute('data-confirm'); f.submit(); }
        });
    });
})();
</script>

<th:block layout:fragment="page-scripts"></th:block>
</body>
</html>
