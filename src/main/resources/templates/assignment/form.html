<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add / Edit Assignment</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'Add' : 'Edit'} + ' Assignment'">Assignment</th:block>

<div layout:fragment="content">
    <div class="card shadow-sm border-0" style="max-width:760px;">
        <div class="card-header bg-white border-bottom fw-semibold"
             th:text="${item.id == null ? 'Add New Assignment' : 'Edit Assignment'}"></div>
        <div class="card-body">
            <form th:action="${item.id == null ? '/assignments' : '/assignments/' + item.id}"
                  th:object="${item}" method="post">

                <div class="row g-3">

                    <!-- Activity -->
                    <div class="col-12">
                        <label class="form-label fw-medium">Activity <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{activityId}"
                                th:classappend="${#fields.hasErrors('activityId')} ? ' is-invalid'">
                            <option value="">-- Select Activity --</option>
                            <option th:each="a : ${activities}"
                                    th:value="${a.id}"
                                    th:text="${a.activityName} + ' [' + ${a.activityCategory.categoryName} + ']'"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{activityId}"></div>
                    </div>

                    <!-- Assigned Date -->
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Assigned Date <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{assignedDate}"
                               th:classappend="${#fields.hasErrors('assignedDate')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{assignedDate}"></div>
                    </div>

                    <!-- Status -->
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}"
                                th:classappend="${#fields.hasErrors('status')} ? ' is-invalid'">
                            <option value="">-- Select Status --</option>
                            <option value="Assigned">Assigned</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                            <option value="Dropped">Dropped</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>

                    <!-- ── CREATE: dynamic multi-member rows ── -->
                    <div th:if="${item.id == null}" class="col-12">

                        <div class="p-3 rounded-3" style="background:#f8faff;border:1px solid #e0e7ff;">

                            <div class="d-flex align-items-center justify-content-between mb-3">
                                <div>
                                    <span class="fw-semibold" style="font-size:0.9rem;color:#1e1b4b;">
                                        <i class="bi bi-people-fill text-primary me-2"></i>Members &amp; Roles
                                    </span>
                                    <span class="text-danger ms-1">*</span>
                                    <div class="text-muted" style="font-size:0.75rem;">Add one or more members and assign a role to each.</div>
                                </div>
                                <button type="button" class="btn btn-primary btn-sm px-3"
                                        onclick="addMemberRow()">
                                    <i class="bi bi-person-plus-fill me-1"></i>Add Member
                                </button>
                            </div>

                            <div id="memberRows" class="d-flex flex-column gap-2"></div>

                            <div class="text-danger mt-2" style="font-size:0.82rem;"
                                 th:if="${#fields.hasErrors('memberId')}"
                                 th:errors="*{memberId}"></div>

                            <div th:if="${duplicateError}"
                                 class="mt-2 d-flex align-items-start gap-2 p-2 rounded-2"
                                 style="background:#fef2f2;border:1px solid #fecaca;font-size:0.82rem;color:#dc2626;">
                                <i class="bi bi-person-x-fill flex-shrink-0 mt-1"></i>
                                <span th:text="${duplicateError}"></span>
                            </div>
                        </div>

                        <!-- Hidden source of member options for JS cloning -->
                        <select id="memberSrc" style="display:none;">
                            <option value="">-- Select Member --</option>
                            <option th:each="m : ${members}"
                                    th:value="${m.id}"
                                    th:text="${m.firstName + ' ' + m.lastName + ' — ' + m.phone}"></option>
                        </select>
                    </div>

                    <!-- ── EDIT: single member + single role ── -->
                    <div th:unless="${item.id == null}" class="col-12">
                        <label class="form-label fw-medium">Member <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{memberId}"
                                th:classappend="${#fields.hasErrors('memberId')} ? ' is-invalid'">
                            <option value="">-- Select Member --</option>
                            <option th:each="m : ${members}"
                                    th:value="${m.id}"
                                    th:text="${m.firstName} + ' ' + ${m.lastName} + ' — ' + ${m.phone}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{memberId}"></div>
                    </div>

                    <div th:unless="${item.id == null}" class="col-md-6">
                        <label class="form-label fw-medium">Role <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{role}"
                                th:classappend="${#fields.hasErrors('role')} ? ' is-invalid'">
                            <option value="">-- Select Role --</option>
                            <option value="Lead">Lead</option>
                            <option value="Co-Lead">Co-Lead</option>
                            <option value="Coordinator">Coordinator</option>
                            <option value="Volunteer">Volunteer</option>
                            <option value="Support">Support</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{role}"></div>
                    </div>

                    <!-- Notes -->
                    <div class="col-12">
                        <label class="form-label fw-medium">Notes</label>
                        <textarea class="form-control" th:field="*{notes}" rows="2"></textarea>
                    </div>

                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <a th:href="@{/assignments}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

<th:block layout:fragment="page-scripts">
<script>
(function () {
    var roles = ['Volunteer','Lead','Co-Lead','Coordinator','Support','Other'];

    function buildRoleOptions() {
        return roles.map(function(r) {
            return '<option value="' + r + '">' + r + '</option>';
        }).join('');
    }

    window.addMemberRow = function () {
        var src = document.getElementById('memberSrc');
        var container = document.getElementById('memberRows');
        if (!src || !container) return;

        var rowNum = container.children.length + 1;

        var div = document.createElement('div');
        div.className = 'd-flex align-items-center gap-2 p-2 rounded-2';
        div.style.background = '#fff';
        div.style.border = '1px solid #e5e7eb';
        div.innerHTML =
            '<span class="badge rounded-pill bg-primary bg-opacity-75 flex-shrink-0" style="min-width:26px;text-align:center;">' + rowNum + '</span>' +
            '<select name="memberIds" class="form-select form-select-sm flex-grow-1">' +
              src.innerHTML +
            '</select>' +
            '<select name="memberRoles" class="form-select form-select-sm" style="max-width:160px;">' +
              buildRoleOptions() +
            '</select>' +
            '<button type="button" class="btn btn-sm btn-outline-danger px-2 flex-shrink-0" ' +
              'onclick="removeRow(this)" title="Remove">' +
              '<i class="bi bi-x-lg"></i>' +
            '</button>';

        container.appendChild(div);
    };

    window.removeRow = function (btn) {
        var row = btn.closest('div[style]');
        row.remove();
        renumber();
    };

    function renumber() {
        var rows = document.querySelectorAll('#memberRows > div');
        rows.forEach(function (div, i) {
            div.querySelector('.badge').textContent = i + 1;
        });
    }

    if (document.getElementById('memberRows')) {
        addMemberRow();
    }
})();
</script>
</th:block>

</body>
</html>
