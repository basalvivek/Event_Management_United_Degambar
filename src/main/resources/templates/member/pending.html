<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Pending Approvals</title></head>
<body>

<th:block layout:fragment="page-title">Pending Member Approvals</th:block>

<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="fw-semibold mb-0">Pending Approvals</h5>
            <span class="text-muted" style="font-size:0.8rem;">Members awaiting admin authorisation</span>
        </div>
        <a th:href="@{/members}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>All Members
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0" style="font-size:0.85rem;">
                <thead class="table-dark">
                    <tr>
                        <th class="px-3">Name</th>
                        <th class="px-3">Email</th>
                        <th class="px-3">Phone</th>
                        <th class="px-3">City</th>
                        <th class="px-3">Registered On</th>
                        <th class="px-3">Membership Type</th>
                        <th class="px-3 text-end">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td class="px-3 fw-medium"
                            th:text="${item.firstName + ' ' + item.lastName}"></td>
                        <td class="px-3 text-muted" th:text="${item.email ?: '-'}"></td>
                        <td class="px-3 text-muted" th:text="${item.phone}"></td>
                        <td class="px-3 text-muted" th:text="${item.city}"></td>
                        <td class="px-3 text-muted"
                            th:text="${#temporals.format(item.createdAt, 'dd/MM/yyyy')}"></td>
                        <td class="px-3">
                            <span class="badge rounded-pill"
                                  style="background:rgba(234,179,8,0.12);color:#a16207;font-size:0.72rem;"
                                  th:text="${item.membershipType}"></span>
                        </td>
                        <td class="px-3 text-end">
                            <form th:action="@{/members/{id}/approve(id=${item.id})}" method="post"
                                  class="d-inline"
                                  data-confirm='Approve this member?'>
                                <button type="submit" class="btn btn-sm btn-success px-3">
                                    <i class="bi bi-check-circle me-1"></i>Approve
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-check2-all d-block mb-2" style="font-size:2rem;opacity:0.3;"></i>
                            No pending approvals. All members are reviewed.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
