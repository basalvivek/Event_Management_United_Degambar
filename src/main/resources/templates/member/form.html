<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add / Edit Member</title></head>
<body>

<th:block layout:fragment="page-title"
          th:text="${item.id == null ? 'Add' : 'Edit'} + ' Member'">Member</th:block>

<div layout:fragment="content">
    <!-- ── Profile Picture (edit only) ── -->
    <div th:if="${item.id != null}" class="mb-4" style="max-width:760px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom d-flex align-items-center gap-2 py-3">
                <i class="bi bi-person-circle text-primary fs-5"></i>
                <span class="fw-semibold">Profile Photo</span>
            </div>
            <div class="card-body d-flex align-items-center gap-4 flex-wrap">

                <!-- Current photo -->
                <div>
                    <img th:if="${item.profilePicture != null}"
                         th:src="@{/members/{id}/photo(id=${item.id})}"
                         alt="Profile"
                         style="width:90px;height:90px;object-fit:cover;border-radius:50%;border:3px solid #dee2e6;">
                    <div th:unless="${item.profilePicture != null}"
                         style="width:90px;height:90px;border-radius:50%;border:2px dashed #ced4da;
                                background:#f8f9fa;display:flex;align-items:center;justify-content:center;">
                        <i class="bi bi-person-fill text-muted" style="font-size:2.2rem;"></i>
                    </div>
                </div>

                <div class="flex-grow-1">
                    <!-- Upload form -->
                    <form th:action="@{/members/{id}/photo(id=${item.id})}"
                          method="post" enctype="multipart/form-data"
                          class="d-flex align-items-center gap-2 flex-wrap mb-2">
                        <input type="file" class="form-control form-control-sm" name="photoFile"
                               accept="image/*" style="max-width:260px;"
                               onchange="previewPhoto(this)">
                        <button type="submit" class="btn btn-outline-primary btn-sm px-3">
                            <i class="bi bi-upload me-1"></i>
                            <span th:text="${item.profilePicture != null ? 'Replace' : 'Upload'}">Upload</span>
                        </button>
                    </form>
                    <div class="form-text">JPG, PNG, WEBP &nbsp;·&nbsp; Max 2 MB</div>

                    <!-- Remove button -->
                    <form th:if="${item.profilePicture != null}"
                          th:action="@{/members/{id}/photo/delete(id=${item.id})}"
                          method="post" class="d-inline mt-1"
                          data-confirm='Remove profile photo?'>
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-trash me-1"></i>Remove Photo
                        </button>
                    </form>
                </div>

                <!-- Inline preview -->
                <div id="photoPreviewWrap" style="display:none;">
                    <img id="photoPreview" alt="Preview"
                         style="width:90px;height:90px;object-fit:cover;border-radius:50%;border:3px solid #0d6efd;">
                </div>

            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0" style="max-width:760px;">
        <div class="card-header bg-white border-bottom fw-semibold"
             th:text="${item.id == null ? 'Register New Member' : 'Edit Member'}"></div>
        <div class="card-body">
            <form th:action="${item.id == null ? '/members' : '/members/' + item.id}"
                  th:object="${item}" method="post">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label fw-medium">First Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{firstName}"
                               th:classappend="${#fields.hasErrors('firstName')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{firstName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Last Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{lastName}"
                               th:classappend="${#fields.hasErrors('lastName')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{lastName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Phone <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{phone}"
                               th:classappend="${#fields.hasErrors('phone')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{phone}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Email</label>
                        <input type="email" class="form-control" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Date of Birth</label>
                        <input type="date" class="form-control" th:field="*{dateOfBirth}"
                               th:classappend="${#fields.hasErrors('dateOfBirth')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{dateOfBirth}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Gender <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{gender}"
                                th:classappend="${#fields.hasErrors('gender')} ? ' is-invalid'">
                            <option value="">-- Select --</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{gender}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Address <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{address}"
                               th:classappend="${#fields.hasErrors('address')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{address}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">City <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{city}"
                               th:classappend="${#fields.hasErrors('city')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{city}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">State <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{state}"
                               th:classappend="${#fields.hasErrors('state')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{state}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Membership Type <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{membershipType}"
                                th:classappend="${#fields.hasErrors('membershipType')} ? ' is-invalid'">
                            <option value="">-- Select --</option>
                            <option value="General">General</option>
                            <option value="Life">Life</option>
                            <option value="Honorary">Honorary</option>
                            <option value="Student">Student</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{membershipType}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Membership Date <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{membershipDate}"
                               th:classappend="${#fields.hasErrors('membershipDate')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{membershipDate}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Occupation</label>
                        <input type="text" class="form-control" th:field="*{occupation}"
                               th:classappend="${#fields.hasErrors('occupation')} ? ' is-invalid'">
                        <div class="invalid-feedback" th:errors="*{occupation}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Status <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{status}"
                                th:classappend="${#fields.hasErrors('status')} ? ' is-invalid'">
                            <option value="">-- Select --</option>
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                            <option value="Suspended">Suspended</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium">Portal Password</label>
                        <input type="text" class="form-control" th:field="*{password}"
                               placeholder="Set member portal login password">
                        <div class="form-text">Used for member portal login. Leave blank if not required.</div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-medium">Notes</label>
                        <textarea class="form-control" th:field="*{notes}" rows="2"
                                  th:classappend="${#fields.hasErrors('notes')} ? ' is-invalid'"></textarea>
                        <div class="invalid-feedback" th:errors="*{notes}"></div>
                    </div>

                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Save
                    </button>
                    <a th:href="@{/members}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>
<th:block layout:fragment="page-scripts">
<script>
function previewPhoto(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('photoPreview').src = e.target.result;
            document.getElementById('photoPreviewWrap').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
</th:block>
</body>
</html>
