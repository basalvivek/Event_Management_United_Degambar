<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Member Registration</title></head>
<body>

<th:block layout:fragment="page-title">Member Registration</th:block>

<div layout:fragment="content">

    <!-- ── Active Event Programs ── -->
    <div th:if="${not #lists.isEmpty(activePrograms)}" class="mb-4">
        <div class="d-flex align-items-center gap-2 mb-3">
            <div class="d-flex align-items-center justify-content-center rounded-circle flex-shrink-0"
                 style="width:32px;height:32px;background:linear-gradient(135deg,#4f46e5,#7c3aed);">
                <i class="bi bi-calendar-event-fill text-white" style="font-size:0.82rem;"></i>
            </div>
            <h6 class="fw-bold mb-0" style="color:#1e293b;">Active Event Programs</h6>
            <span class="badge rounded-pill"
                  style="background:#eef2ff;color:#4f46e5;font-size:0.7rem;"
                  th:text="${#lists.size(activePrograms)} + ' program' + (${#lists.size(activePrograms)} != 1 ? 's' : '')"></span>
        </div>
        <div class="row g-3 mb-2">
            <div th:each="prog : ${activePrograms}" class="col-sm-6 col-xl-4">
                <div class="card border-0 shadow-sm h-100" style="border-radius:14px;overflow:hidden;">
                    <div style="height:3px;background:linear-gradient(90deg,#4f46e5 0%,#7c3aed 100%);"></div>
                    <div class="card-body p-3">

                        <!-- Program name + Active badge -->
                        <div class="d-flex align-items-start justify-content-between gap-2 mb-2">
                            <span class="fw-bold" style="font-size:0.88rem;color:#1e293b;line-height:1.35;"
                                  th:text="${prog.programName}"></span>
                            <span class="badge flex-shrink-0"
                                  style="background:#dcfce7;color:#16a34a;font-size:0.67rem;font-weight:600;">Active</span>
                        </div>

                        <!-- Event name -->
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-calendar2-event flex-shrink-0" style="font-size:0.78rem;color:#4f46e5;"></i>
                            <span class="text-truncate" style="font-size:0.78rem;color:#4f46e5;font-weight:600;"
                                  th:text="${prog.event.eventName}"></span>
                        </div>

                        <!-- Time slot -->
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-clock flex-shrink-0" style="font-size:0.78rem;color:#64748b;"></i>
                            <span style="font-size:0.78rem;color:#475569;"
                                  th:text="${#temporals.format(prog.startTime, 'HH:mm')} + ' – ' + ${#temporals.format(prog.endTime, 'HH:mm')}"></span>
                        </div>

                        <!-- Responsible member -->
                        <div th:if="${prog.responsibleMember != null}" class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-person-fill flex-shrink-0" style="font-size:0.78rem;color:#64748b;"></i>
                            <span style="font-size:0.78rem;color:#475569;"
                                  th:text="${prog.responsibleMember.firstName} + ' ' + ${prog.responsibleMember.lastName}"></span>
                        </div>

                        <!-- Description -->
                        <div th:if="${prog.programDescription != null and !prog.programDescription.isEmpty()}"
                             class="text-muted mt-1 mb-2"
                             style="font-size:0.75rem;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                             th:text="${prog.programDescription}"></div>

                        <!-- Remark -->
                        <div th:if="${prog.remark != null and !prog.remark.isEmpty()}"
                             class="d-flex align-items-start gap-1 mt-1 px-2 py-1 rounded-2"
                             style="background:#f8faff;font-size:0.73rem;color:#64748b;">
                            <i class="bi bi-chat-dots flex-shrink-0 mt-1" style="color:#4f46e5;"></i>
                            <span th:text="${prog.remark}"></span>
                        </div>

                    </div>
                </div>
            </div>
        </div>
        <hr class="mb-4" style="border-color:#e2e8f0;">
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-semibold mb-0">Member Registration</h5>
        <a th:href="@{/members/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Add New Member
        </a>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th style="width:48px;"></th>
                        <th>#</th>
                        <th>Full Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>City</th>
                        <th>Membership</th>
                        <th>Member Since</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item, stat : ${items}">
                        <td class="ps-3">
                            <img th:if="${item.profilePicture != null}"
                                 th:src="@{/members/{id}/photo(id=${item.id})}"
                                 alt=""
                                 style="width:36px;height:36px;object-fit:cover;border-radius:50%;border:2px solid #dee2e6;">
                            <div th:unless="${item.profilePicture != null}"
                                 style="width:36px;height:36px;border-radius:50%;background:#e9ecef;
                                        display:flex;align-items:center;justify-content:center;">
                                <i class="bi bi-person-fill text-muted" style="font-size:1rem;"></i>
                            </div>
                        </td>
                        <td class="text-muted" th:text="${stat.count}"></td>
                        <td class="fw-medium" th:text="${item.firstName} + ' ' + ${item.lastName}"></td>
                        <td th:text="${item.phone}"></td>
                        <td th:text="${item.email != null} ? ${item.email} : '-'"></td>
                        <td th:text="${item.city}"></td>
                        <td><span class="badge bg-primary bg-opacity-75" th:text="${item.membershipType}"></span></td>
                        <td th:text="${#temporals.format(item.membershipDate, 'dd-MMM-yyyy')}"></td>
                        <td>
                            <span th:with="sc=${item.status == 'Active'} ? 'bg-success' : (${item.status == 'Suspended'} ? 'bg-warning text-dark' : 'bg-secondary')"
                                  th:class="'badge ' + ${sc}"
                                  th:text="${item.status}"></span>
                        </td>
                        <td class="text-end">
                            <a th:if="${item.qrCode != null}"
                               th:href="@{/members/{id}/qr(id=${item.id})}"
                               class="btn btn-sm btn-outline-success"
                               title="Download QR Code">
                                <i class="bi bi-qr-code"></i>
                            </a>
                            <a th:href="@{/members/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/members/{id}/delete(id=${item.id})}" method="post" class="d-inline"
                                  data-confirm='Delete this member?'>
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="10" class="text-center text-muted py-4">No members found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
