<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Member Registration — UDJCS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 50%, #f0fdf4 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 32px 16px;
        }

        .reg-card {
            max-width: 760px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
            overflow: hidden;
        }

        .reg-header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            padding: 28px 36px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .reg-header img {
            width: 52px; height: 52px;
            object-fit: contain; border-radius: 10px;
            background: rgba(255,255,255,0.15);
            padding: 4px;
        }
        .reg-header-text h4 {
            color: #fff; font-weight: 800; font-size: 1.25rem; margin: 0 0 2px;
        }
        .reg-header-text p {
            color: rgba(255,255,255,0.7); font-size: 0.8rem; margin: 0;
        }

        .reg-body { padding: 32px 36px; }

        .section-label {
            font-size: 0.68rem; font-weight: 700; letter-spacing: 1.2px;
            text-transform: uppercase; color: #9ca3af;
            margin: 0 0 14px;
        }

        label.form-label { font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 5px; }

        .form-control, .form-select {
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.87rem;
            padding: 9px 12px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .input-group-text {
            border: 1.5px solid #e5e7eb;
            background: #f9fafb;
            color: #9ca3af;
            border-radius: 8px 0 0 8px;
            font-size: 0.9rem;
        }
        .input-group .form-control { border-radius: 0 8px 8px 0; border-left: none; }
        .input-group .form-control:focus { border-left: 1.5px solid #6366f1; }

        .btn-register {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none; color: #fff;
            padding: 12px 32px; border-radius: 8px;
            font-weight: 700; font-size: 0.92rem;
            transition: opacity 0.15s, transform 0.12s;
            box-shadow: 0 4px 14px rgba(79,70,229,0.35);
        }
        .btn-register:hover { opacity: 0.92; transform: translateY(-1px); color: #fff; }

        .reg-footer {
            background: #f9fafb;
            border-top: 1px solid #f3f4f6;
            padding: 16px 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 0.79rem;
            color: #9ca3af;
        }
        .reg-footer a { color: #6366f1; font-weight: 600; text-decoration: none; }
        .reg-footer a:hover { text-decoration: underline; }
        .reg-footer a.green { color: #10b981; }

        .divider-label {
            border-top: 1px solid #f3f4f6;
            margin: 24px 0 20px;
            position: relative;
        }
        .divider-label span {
            position: absolute; top: -10px; left: 0;
            background: #fff; padding-right: 10px;
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 1.2px; text-transform: uppercase;
            color: #9ca3af;
        }

        @media (max-width: 576px) {
            .reg-body { padding: 24px 20px; }
            .reg-header { padding: 20px; }
            .reg-footer { padding: 14px 20px; }
        }
    </style>
</head>
<body>

<div class="reg-card">

    <!-- Header -->
    <div class="reg-header">
        <img th:src="@{/images/logo.jpeg}" alt="UDJCS">
        <div class="reg-header-text">
            <h4>Join Our Community</h4>
            <p>United Digambar Jain Community — Member Registration</p>
        </div>
    </div>

    <!-- Body -->
    <div class="reg-body">

        <!-- Error -->
        <div th:if="${error}"
             class="alert alert-danger d-flex align-items-center gap-2 mb-4"
             style="border-radius:10px;border:none;background:#fef2f2;">
            <i class="bi bi-exclamation-circle-fill text-danger"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" method="post" novalidate>

            <!-- Personal Details -->
            <p class="section-label">Personal Details</p>
            <div class="row g-3 mb-2">
                <div class="col-md-6">
                    <label class="form-label">First Name <span class="text-danger">*</span></label>
                    <input type="text" name="firstName" class="form-control"
                           th:value="${firstName}" placeholder="First name" required autofocus>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name <span class="text-danger">*</span></label>
                    <input type="text" name="lastName" class="form-control"
                           th:value="${lastName}" placeholder="Last name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Gender <span class="text-danger">*</span></label>
                    <select name="gender" class="form-select" required>
                        <option value="">-- Select --</option>
                        <option value="Male"   th:selected="${gender == 'Male'}">Male</option>
                        <option value="Female" th:selected="${gender == 'Female'}">Female</option>
                        <option value="Other"  th:selected="${gender == 'Other'}">Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                        <input type="text" name="phone" class="form-control"
                               th:value="${phone}" placeholder="+91 00000 00000" required>
                    </div>
                </div>
            </div>

            <!-- Address -->
            <div class="divider-label"><span>Address</span></div>
            <div class="row g-3 mb-2">
                <div class="col-12">
                    <label class="form-label">Address <span class="text-danger">*</span></label>
                    <input type="text" name="address" class="form-control"
                           th:value="${address}" placeholder="Street address" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">City <span class="text-danger">*</span></label>
                    <input type="text" name="city" class="form-control"
                           th:value="${city}" placeholder="City" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">State <span class="text-danger">*</span></label>
                    <input type="text" name="state" class="form-control"
                           th:value="${state}" placeholder="State" required>
                </div>
            </div>

            <!-- Login Credentials -->
            <div class="divider-label"><span>Portal Login Credentials</span></div>
            <div class="row g-3 mb-4">
                <div class="col-md-12">
                    <label class="form-label">Email Address <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control"
                               th:value="${email}" placeholder="your@email.com" required>
                    </div>
                    <div class="form-text">Used to log in to the member portal.</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Password <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="pwd" class="form-control"
                               placeholder="Create a password" required>
                        <button type="button" class="btn btn-outline-secondary"
                                style="border:1.5px solid #e5e7eb;border-left:none;"
                                onclick="togglePwd('pwd','eyePwd')">
                            <i class="bi bi-eye" id="eyePwd"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="confirmPassword" id="cpwd" class="form-control"
                               placeholder="Repeat password" required>
                        <button type="button" class="btn btn-outline-secondary"
                                style="border:1.5px solid #e5e7eb;border-left:none;"
                                onclick="togglePwd('cpwd','eyeCpwd')">
                            <i class="bi bi-eye" id="eyeCpwd"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="d-flex align-items-center gap-3 flex-wrap">
                <button type="submit" class="btn btn-register">
                    <i class="bi bi-person-plus me-2"></i>Register
                </button>
                <span class="text-muted" style="font-size:0.8rem;">
                    Your registration will be reviewed by an admin before portal access is granted.
                </span>
            </div>

        </form>
    </div>

    <!-- Footer -->
    <div class="reg-footer">
        <span>Already registered? <a th:href="@{/member-login}" class="green">Sign in to Portal</a></span>
        <span>Admin? <a th:href="@{/login}">Admin Login</a></span>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(fieldId, iconId) {
    var f = document.getElementById(fieldId);
    var i = document.getElementById(iconId);
    var show = f.type === 'password';
    f.type = show ? 'text' : 'password';
    i.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
}
</script>
</body>
</html>
