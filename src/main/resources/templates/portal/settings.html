<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/portal-base}">
<head><title>Settings</title></head>
<body>

<div layout:fragment="content">
<div class="container py-4" style="max-width:680px;">

    <h5 class="fw-bold mb-4" style="color:#1a1a2e;">
        <i class="bi bi-gear me-2 text-muted"></i>Account Settings
    </h5>

    <!-- ── Profile Photo ── -->
    <div class="card border-0 shadow-sm mb-4" style="border-radius:14px;">
        <div class="card-header bg-white border-bottom d-flex align-items-center gap-2 py-3 px-4"
             style="border-radius:14px 14px 0 0;">
            <i class="bi bi-person-circle text-primary"></i>
            <span class="fw-semibold" style="font-size:0.9rem;">Profile Photo</span>
        </div>
        <div class="card-body px-4 py-3 d-flex align-items-center gap-4 flex-wrap">

            <!-- Avatar -->
            <div>
                <img th:if="${member.profilePicture != null}"
                     th:src="@{/members/{id}/photo(id=${member.id})}"
                     alt="Photo"
                     style="width:88px;height:88px;object-fit:cover;border-radius:50%;
                            border:3px solid #e5e7eb;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                <div th:unless="${member.profilePicture != null}"
                     style="width:88px;height:88px;border-radius:50%;
                            background:linear-gradient(135deg,#10b981,#059669);
                            display:flex;align-items:center;justify-content:center;
                            box-shadow:0 2px 8px rgba(16,185,129,0.3);">
                    <span style="font-size:2rem;font-weight:700;color:#fff;"
                          th:text="${#strings.substring(member.firstName,0,1)}">M</span>
                </div>
            </div>

            <div class="flex-grow-1">
                <div class="fw-semibold mb-1" style="font-size:0.9rem;color:#1a1a2e;"
                     th:text="${member.firstName + ' ' + member.lastName}"></div>
                <div class="text-muted mb-2" style="font-size:0.78rem;" th:text="${member.email ?: 'No email set'}"></div>

                <!-- Upload form -->
                <form th:action="@{/portal/settings/photo}" method="post"
                      enctype="multipart/form-data"
                      class="d-flex align-items-center gap-2 flex-wrap">
                    <input type="file" name="photoFile" accept="image/*"
                           class="form-control form-control-sm" style="max-width:230px;"
                           onchange="previewPhoto(this)">
                    <button type="submit" class="btn btn-outline-primary btn-sm px-3">
                        <i class="bi bi-upload me-1"></i>
                        <span th:text="${member.profilePicture != null ? 'Replace' : 'Upload'}">Upload</span>
                    </button>
                </form>
                <div class="form-text mt-1">JPG, PNG, WEBP &nbsp;·&nbsp; Max 2 MB</div>

                <!-- Remove -->
                <form th:if="${member.profilePicture != null}"
                      th:action="@{/portal/settings/photo/delete}" method="post"
                      class="d-inline" data-confirm='Remove your profile photo?'>
                    <button type="submit" class="btn btn-outline-danger btn-sm mt-1">
                        <i class="bi bi-trash me-1"></i>Remove Photo
                    </button>
                </form>
            </div>

            <!-- Live preview -->
            <div id="photoPreviewWrap" style="display:none;">
                <img id="photoPreview" alt="Preview"
                     style="width:88px;height:88px;object-fit:cover;border-radius:50%;
                            border:3px solid #0d6efd;">
            </div>

        </div>
    </div>

    <!-- ── Profile Details ── -->
    <div class="card border-0 shadow-sm" style="border-radius:14px;">
        <div class="card-header bg-white border-bottom d-flex align-items-center gap-2 py-3 px-4"
             style="border-radius:14px 14px 0 0;">
            <i class="bi bi-person-lines-fill text-success"></i>
            <span class="fw-semibold" style="font-size:0.9rem;">Personal Details</span>
        </div>
        <div class="card-body px-4 py-4">

            <!-- Read-only fields -->
            <div class="row g-3 mb-4 pb-3" style="border-bottom:1px solid #f3f4f6;">
                <div class="col-md-6">
                    <label class="form-label fw-medium" style="font-size:0.8rem;color:#6b7280;">Full Name</label>
                    <div class="form-control-plaintext fw-semibold" style="font-size:0.88rem;"
                         th:text="${member.firstName + ' ' + member.lastName}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium" style="font-size:0.8rem;color:#6b7280;">Membership Type</label>
                    <div class="form-control-plaintext">
                        <span class="badge rounded-pill"
                              style="background:rgba(59,130,246,0.12);color:#2563eb;font-size:0.76rem;"
                              th:text="${member.membershipType}"></span>
                    </div>
                </div>
            </div>

            <!-- Editable fields -->
            <form th:action="@{/portal/settings}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-medium">
                        Address <span class="text-danger">*</span>
                    </label>
                    <input type="text" name="address" class="form-control"
                           th:value="${member.address}"
                           placeholder="Enter your address" required>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-medium">
                            Phone Number <span class="text-danger">*</span>
                        </label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">
                                <i class="bi bi-telephone text-muted"></i>
                            </span>
                            <input type="text" name="phone" class="form-control"
                                   th:value="${member.phone}"
                                   placeholder="+91 00000 00000" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
                            <input type="email" name="email" class="form-control"
                                   th:value="${member.email}"
                                   placeholder="your@email.com">
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                    <a th:href="@{/portal}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</div>
</div>

<th:block layout:fragment="page-scripts">
<script>
function previewPhoto(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('photoPreview').src = e.target.result;
            document.getElementById('photoPreviewWrap').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
</th:block>

</body>
</html>
